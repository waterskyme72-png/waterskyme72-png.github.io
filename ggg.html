<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配筋圖面核對系統</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background-color: #0a1628;
    background-image:
      linear-gradient(rgba(74,158,255,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74,158,255,0.07) 1px, transparent 1px);
    background-size: 40px 40px;
    font-family: 'Courier New', monospace;
    color: #c8deff;
    padding: 24px 16px;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
    border-bottom: 1px solid #1e4d8c;
    padding-bottom: 20px;
  }
  header .eyebrow {
    font-size: 11px;
    color: #4a9eff;
    letter-spacing: 4px;
    margin-bottom: 6px;
  }
  header h1 {
    font-size: 22px;
    font-weight: bold;
    color: #fff;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  header .sub {
    font-size: 12px;
    color: #4a9eff;
    letter-spacing: 2px;
    margin-top: 6px;
  }

  .upload-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  .upload-label {
    font-size: 11px;
    color: #4a9eff;
    letter-spacing: 2px;
    margin-bottom: 8px;
    font-weight: bold;
    text-transform: uppercase;
  }

  .upload-box {
    border: 2px dashed #1e4d8c;
    border-radius: 8px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: rgba(30,77,140,0.08);
    min-height: 160px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .upload-box:hover { border-color: #4a9eff; background: rgba(74,158,255,0.1); }
  .upload-box.has-image { border-color: #4a9eff; background: rgba(74,158,255,0.1); }

  .upload-icon { font-size: 32px; margin-bottom: 8px; opacity: 0.5; }
  .upload-text { font-size: 12px; color: rgba(200,222,255,0.6); }
  .upload-hint { font-size: 11px; color: rgba(200,222,255,0.35); margin-top: 6px; }

  .preview-img {
    max-width: 100%;
    max-height: 140px;
    object-fit: contain;
    border-radius: 4px;
    border: 1px solid #1e4d8c;
    margin-bottom: 6px;
  }

  .clear-btn {
    background: none;
    border: none;
    color: rgba(200,222,255,0.35);
    cursor: pointer;
    font-size: 10px;
    font-family: 'Courier New', monospace;
    text-decoration: underline;
    padding: 2px 6px;
  }

  .compare-btn {
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 2px solid #4a9eff;
    color: #4a9eff;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    margin-bottom: 24px;
    font-weight: bold;
  }
  .compare-btn:hover:not(:disabled) { background: rgba(74,158,255,0.12); }
  .compare-btn:disabled { opacity: 0.35; cursor: not-allowed; border-color: #1e4d8c; color: #1e4d8c; }
  .compare-btn.loading { border-color: #ffcc44; color: #ffcc44; }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: rgba(255,204,68,0.07);
    border: 1px solid rgba(255,204,68,0.3);
    border-radius: 4px;
    margin-bottom: 20px;
    font-size: 12px;
    color: #ffcc44;
  }
  .status-bar.error { background: rgba(255,82,82,0.07); border-color: rgba(255,82,82,0.4); color: #ff5252; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,204,68,0.3);
    border-top: 2px solid #ffcc44;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  .result-section { margin-top: 8px; }
  .result-header {
    font-size: 11px;
    letter-spacing: 2px;
    color: #4a9eff;
    text-transform: uppercase;
    margin-bottom: 12px;
    border-bottom: 1px solid #1e4d8c;
    padding-bottom: 8px;
  }

  .badges { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 1px;
  }
  .badge-ok { background: rgba(72,199,116,0.15); border: 1px solid rgba(72,199,116,0.5); color: #48c774; }
  .badge-diff { background: rgba(255,82,82,0.15); border: 1px solid rgba(255,82,82,0.5); color: #ff5252; }
  .badge-warn { background: rgba(255,193,7,0.15); border: 1px solid rgba(255,193,7,0.5); color: #ffc107; }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 20px; }
  th {
    padding: 8px 10px;
    background: rgba(30,77,140,0.5);
    border: 1px solid #1e4d8c;
    color: #4a9eff;
    letter-spacing: 1px;
    text-align: left;
    font-size: 10px;
    text-transform: uppercase;
  }
  td {
    padding: 7px 10px;
    border: 1px solid rgba(30,77,140,0.5);
    vertical-align: top;
    line-height: 1.5;
  }
  tr:hover td { background: rgba(74,158,255,0.04); }
  .td-beam { color: #fff; font-weight: bold; white-space: nowrap; }
  .td-ok { background: rgba(72,199,116,0.05); color: #48c774; }
  .td-diff { background: rgba(255,82,82,0.08); color: #ff5252; }
  .td-warn { background: rgba(255,193,7,0.07); color: #ffc107; }
  .td-note { color: rgba(200,222,255,0.55); font-size: 10px; }

  .alert {
    padding: 12px 14px;
    border-radius: 4px;
    font-size: 11px;
    margin-bottom: 12px;
  }
  .alert-diff { background: rgba(255,82,82,0.07); border: 1px solid rgba(255,82,82,0.3); color: #ff8888; }
  .alert-ok { background: rgba(72,199,116,0.07); border: 1px solid rgba(72,199,116,0.3); color: #48c774; }

  .raw-section { margin-top: 20px; border-top: 1px solid #1e4d8c; padding-top: 16px; }
  .raw-toggle {
    background: none; border: none;
    color: rgba(200,222,255,0.4);
    cursor: pointer; font-size: 11px;
    letter-spacing: 1px; padding: 4px 0;
    font-family: 'Courier New', monospace;
    text-decoration: underline;
  }
  .raw-text {
    margin-top: 10px;
    background: rgba(0,0,0,0.3);
    border: 1px solid #1e4d8c;
    border-radius: 4px;
    padding: 14px;
    font-size: 11px;
    color: rgba(200,222,255,0.7);
    white-space: pre-wrap;
    line-height: 1.7;
    max-height: 320px;
    overflow-y: auto;
    font-family: 'Courier New', monospace;
    display: none;
  }
  .raw-text.visible { display: block; }

  footer {
    text-align: center;
    margin-top: 32px;
    font-size: 10px;
    color: rgba(200,222,255,0.2);
    letter-spacing: 2px;
  }

  input[type="file"] { display: none; }
</style>
</head>
<body>

<header>
  <div class="eyebrow">STRUCTURAL DRAWING</div>
  <h1>配筋圖面核對系統</h1>
  <div class="sub">REBAR COMPARISON TOOL — AI POWERED</div>
</header>

<div class="upload-row">
  <div>
    <div class="upload-label">圖 A（CAD / DWG 列印）</div>
    <div class="upload-box" id="boxA" onclick="document.getElementById('fileA').click()"
         ondragover="event.preventDefault()" ondrop="handleDrop(event,'A')">
      <div id="placeholderA">
        <div class="upload-icon">📐</div>
        <div class="upload-text">點擊上傳或拖曳</div>
        <div class="upload-hint">JPG / PNG / WEBP</div>
      </div>
      <div id="previewA" style="display:none; flex-direction:column; align-items:center;">
        <img id="imgA" class="preview-img" />
        <button class="clear-btn" onclick="clearImg(event,'A')">移除</button>
      </div>
    </div>
    <input type="file" id="fileA" accept="image/*" onchange="loadFile(event,'A')">
  </div>
  <div>
    <div class="upload-label">圖 B（紙本拍照）</div>
    <div class="upload-box" id="boxB" onclick="document.getElementById('fileB').click()"
         ondragover="event.preventDefault()" ondrop="handleDrop(event,'B')">
      <div id="placeholderB">
        <div class="upload-icon">📷</div>
        <div class="upload-text">點擊上傳或拖曳</div>
        <div class="upload-hint">JPG / PNG / WEBP</div>
      </div>
      <div id="previewB" style="display:none; flex-direction:column; align-items:center;">
        <img id="imgB" class="preview-img" />
        <button class="clear-btn" onclick="clearImg(event,'B')">移除</button>
      </div>
    </div>
    <input type="file" id="fileB" accept="image/*" onchange="loadFile(event,'B')">
  </div>
</div>

<button class="compare-btn" id="compareBtn" onclick="compare()" disabled>▶ 開始比對</button>

<div id="statusBar" style="display:none;" class="status-bar">
  <div class="spinner"></div>
  <span>AI 正在讀取兩張圖面的配筋資訊，請稍候...</span>
</div>

<div id="errorBar" style="display:none;" class="status-bar error"></div>

<div id="resultSection" style="display:none;" class="result-section">
  <div class="result-header">— 比對結果 ——————————————</div>
  <div class="badges" id="badges"></div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>梁編號</th>
          <th>狀態</th>
          <th>圖 A</th>
          <th>圖 B</th>
          <th>備註</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div id="alertBox"></div>
</div>

<div id="rawSection" style="display:none;" class="raw-section">
  <button class="raw-toggle" onclick="toggleRaw()">▼ 查看 AI 原始輸出</button>
  <pre id="rawText" class="raw-text"></pre>
</div>

<footer>AI 比對僅供參考，最終以人工核對為準</footer>

<script>
  const state = { b64A: null, b64B: null, mimeA: 'image/jpeg', mimeB: 'image/jpeg' };

  function fileToBase64(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
  }

  async function loadFile(event, side) {
    const file = event.target.files[0];
    if (!file) return;
    await processFile(file, side);
  }

  async function handleDrop(event, side) {
    event.preventDefault();
    const file = event.dataTransfer.files[0];
    if (!file) return;
    await processFile(file, side);
  }

  async function processFile(file, side) {
    const b64 = await fileToBase64(file);
    const url = URL.createObjectURL(file);
    const mime = file.type || 'image/jpeg';
    if (side === 'A') {
      state.b64A = b64; state.mimeA = mime;
      document.getElementById('imgA').src = url;
      document.getElementById('placeholderA').style.display = 'none';
      document.getElementById('previewA').style.display = 'flex';
      document.getElementById('boxA').classList.add('has-image');
    } else {
      state.b64B = b64; state.mimeB = mime;
      document.getElementById('imgB').src = url;
      document.getElementById('placeholderB').style.display = 'none';
      document.getElementById('previewB').style.display = 'flex';
      document.getElementById('boxB').classList.add('has-image');
    }
    updateBtn();
  }

  function clearImg(event, side) {
    event.stopPropagation();
    if (side === 'A') {
      state.b64A = null;
      document.getElementById('placeholderA').style.display = 'block';
      document.getElementById('previewA').style.display = 'none';
      document.getElementById('boxA').classList.remove('has-image');
      document.getElementById('fileA').value = '';
    } else {
      state.b64B = null;
      document.getElementById('placeholderB').style.display = 'block';
      document.getElementById('previewB').style.display = 'none';
      document.getElementById('boxB').classList.remove('has-image');
      document.getElementById('fileB').value = '';
    }
    updateBtn();
  }

  function updateBtn() {
    const btn = document.getElementById('compareBtn');
    btn.disabled = !(state.b64A && state.b64B);
  }

  function toggleRaw() {
    const el = document.getElementById('rawText');
    const btn = event.target;
    el.classList.toggle('visible');
    btn.textContent = el.classList.contains('visible') ? '▲ 隱藏 AI 原始輸出' : '▼ 查看 AI 原始輸出';
  }

  async function compare() {
    const btn = document.getElementById('compareBtn');
    btn.disabled = true;
    btn.classList.add('loading');
    btn.textContent = '▶ AI 比對中...';

    document.getElementById('statusBar').style.display = 'flex';
    document.getElementById('errorBar').style.display = 'none';
    document.getElementById('resultSection').style.display = 'none';
    document.getElementById('rawSection').style.display = 'none';

    const prompt = `你是一位專業的結構工程師，正在核對兩張建築結構配筋圖面（圖A與圖B）是否一致。

請仔細閱讀兩張圖面上的每一根梁的配筋資訊，包括：
- 梁編號（如 RG11a、7G11b 等）
- 梁尺寸（如 80X100）
- 主筋號數與根數（如 #5-27#15）
- 箍筋規格與間距（如 5-#10、7-#10）
- 其他標註（如 1L-#5(EF.)）

請輸出一個 JSON 陣列，每個元素代表一根梁，格式如下：
[
  {
    "beam": "梁編號",
    "status": "same" 或 "diff" 或 "unclear",
    "versionA": "圖A的配筋描述",
    "versionB": "圖B的配筋描述",
    "note": "差異說明或備註"
  }
]

status 說明：same=兩版本一致，diff=有差異，unclear=圖面品質無法確認。
只輸出 JSON 陣列，不要其他文字或 markdown。`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 4000,
          messages: [{
            role: 'user',
            content: [
              { type: 'text', text: '以下是圖A（第一個版本）：' },
              { type: 'image', source: { type: 'base64', media_type: state.mimeA, data: state.b64A } },
              { type: 'text', text: '以下是圖B（第二個版本）：' },
              { type: 'image', source: { type: 'base64', media_type: state.mimeB, data: state.b64B } },
              { type: 'text', text: prompt }
            ]
          }]
        })
      });

      const data = await response.json();
      const text = (data.content || []).map(i => i.text || '').join('\n');

      document.getElementById('rawText').textContent = text;
      document.getElementById('rawSection').style.display = 'block';

      // Parse JSON
      let rows = null;
      try {
        const clean = text.replace(/```json|```/g, '').trim();
        rows = JSON.parse(clean);
      } catch(e) {
        // Try extracting array
        const m = text.match(/(\[[\s\S]*\])/);
        if (m) { try { rows = JSON.parse(m[1]); } catch {} }
      }

      if (rows && Array.isArray(rows)) {
        renderTable(rows);
      } else {
        // Show raw only
        document.getElementById('rawText').classList.add('visible');
      }

    } catch (e) {
      const eb = document.getElementById('errorBar');
      eb.textContent = '⚠ 比對失敗：' + e.message;
      eb.style.display = 'flex';
    } finally {
      document.getElementById('statusBar').style.display = 'none';
      btn.classList.remove('loading');
      btn.textContent = '▶ 開始比對';
      btn.disabled = false;
    }
  }

  function renderTable(rows) {
    const same = rows.filter(r => r.status === 'same').length;
    const diff = rows.filter(r => r.status === 'diff').length;
    const unclear = rows.filter(r => r.status === 'unclear').length;

    document.getElementById('badges').innerHTML = `
      <span class="badge badge-ok">✓ 一致 ${same} 項</span>
      <span class="badge badge-diff">✗ 差異 ${diff} 項</span>
      <span class="badge badge-warn">? 無法確認 ${unclear} 項</span>
    `;

    const statusIcon = s => s === 'same' ? '<span style="color:#48c774;font-size:14px">✓</span>'
      : s === 'diff' ? '<span style="color:#ff5252;font-size:14px">✗</span>'
      : '<span style="color:#ffc107;font-size:14px">?</span>';

    const tdClass = s => s === 'same' ? 'td-ok' : s === 'diff' ? 'td-diff' : 'td-warn';

    document.getElementById('tableBody').innerHTML = rows.map(r => `
      <tr>
        <td class="td-beam">${r.beam || '—'}</td>
        <td style="text-align:center">${statusIcon(r.status)}</td>
        <td class="${tdClass(r.status)}">${r.versionA || '—'}</td>
        <td class="${tdClass(r.status)}">${r.versionB || '—'}</td>
        <td class="td-note">${r.note || ''}</td>
      </tr>
    `).join('');

    document.getElementById('alertBox').innerHTML = diff > 0
      ? `<div class="alert alert-diff">⚠ 發現 ${diff} 處差異，請人工核對上方紅色標示項目。</div>`
      : same > 0
      ? `<div class="alert alert-ok">✓ 所有可辨識的梁配筋資訊兩版本一致。</div>`
      : '';

    document.getElementById('resultSection').style.display = 'block';
  }
</script>
</body>
</html>
