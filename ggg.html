<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梁配筋核對系統 - Gemma 4 修正版</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a1628; color: #c8deff; font-family: monospace; padding: 20px;
    background-image: linear-gradient(rgba(74,158,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(74,158,255,0.05) 1px, transparent 1px);
    background-size: 30px 30px;
  }
  .container { max-width: 800px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #1e4d8c; }
  .input-group { margin-bottom: 15px; }
  label { display: block; font-size: 11px; color: #4a9eff; margin-bottom: 5px; font-weight: bold; }
  input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #1e4d8c; color: #fff; border-radius: 4px; }
  .upload-area { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
  .drop-zone {
    border: 2px dashed #1e4d8c; height: 120px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; background: rgba(30,77,140,0.1); border-radius: 8px; text-align: center;
  }
  .preview { max-width: 100%; max-height: 80px; display: none; margin-top: 5px; border: 1px solid #4a9eff; }
  .btn-run {
    width: 100%; padding: 15px; background: transparent; border: 2px solid #4a9eff;
    color: #4a9eff; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 16px;
  }
  .btn-run:disabled { opacity: 0.3; cursor: not-allowed; }
  #statusLog {
    margin-top: 15px; background: #000; border: 1px solid #1e4d8c; padding: 10px;
    font-size: 12px; max-height: 200px; overflow-y: auto; color: #aaa;
  }
  .log-blue { color: #4a9eff; }
  .log-red { color: #ff5252; }
  .log-green { color: #48c774; }
  table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; display: none; }
  th, td { border: 1px solid #1e4d8c; padding: 10px; text-align: left; }
  th { background: rgba(74,158,255,0.1); color: #4a9eff; }
  .diff { background: rgba(255,82,82,0.1); color: #ff8888; }
</style>
</head>
<body>

<div class="container">
  <header><h1>梁配筋核對 (Gemma 4 穩定版)</h1></header>

  <div class="input-group">
    <label>GOOGLE AI API KEY</label>
    <input type="password" id="apiKey" placeholder="輸入 API Key..." oninput="checkValid()">
  </div>

  <div class="input-group">
    <label>模型名稱</label>
    <select id="modelName">
      <option value="gemma-4-26b-a4b-it">gemma-4-26b-a4b-it (截圖流量型)</option>
      <option value="gemma-4-31b-it">gemma-4-31b-it</option>
      <option value="gemini-1.5-flash">gemini-1.5-flash (備用穩定型)</option>
    </select>
  </div>

  <div class="upload-area">
    <div class="drop-zone" onclick="document.getElementById('fileA').click()">
      <div id="textA">圖 A (CAD)</div>
      <img id="prevA" class="preview">
      <input type="file" id="fileA" hidden accept="image/*" onchange="handleFile(this, 'A')">
    </div>
    <div class="drop-zone" onclick="document.getElementById('fileB').click()">
      <div id="textB">圖 B (現場)</div>
      <img id="prevB" class="preview">
      <input type="file" id="fileB" hidden accept="image/*" onchange="handleFile(this, 'B')">
    </div>
  </div>

  <button id="runBtn" class="btn-run" onclick="startAnalysis()" disabled>開始 AI 比對分析</button>

  <div id="statusLog">準備就緒，請上傳圖檔...</div>

  <table id="resultTable">
    <thead>
      <tr><th>梁號</th><th>狀態</th><th>圖A</th><th>圖B</th><th>差異</th></tr>
    </thead>
    <tbody id="resultBody"></tbody>
  </table>
</div>

<script>
let imgData = { A: null, B: null };

function addLog(msg, cls = '') {
  const log = document.getElementById('statusLog');
  const t = new Date().toLocaleTimeString();
  log.innerHTML += `<div class="${cls}">[${t}] ${msg}</div>`;
  log.scrollTop = log.scrollHeight;
}

function checkValid() {
  const key = document.getElementById('apiKey').value.trim();
  document.getElementById('runBtn').disabled = !(imgData.A && imgData.B && key);
}

function handleFile(input, side) {
  const file = input.files[0];
  if (!file) return;
  addLog(`讀取圖檔 ${side}...`);
  
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      const MAX = 1024; // 強制縮小解析度避免傳輸卡住
      if (w > MAX || h > MAX) {
        const r = Math.min(MAX/w, MAX/h);
        w *= r; h *= r;
      }
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      
      const base64 = canvas.toDataURL('image/jpeg', 0.8);
      imgData[side] = base64.split(',')[1];
      
      const prev = document.getElementById('prev' + side);
      prev.src = base64;
      prev.style.display = 'block';
      document.getElementById('text' + side).style.display = 'none';
      addLog(`圖檔 ${side} 處理完成 (${w}x${h})`, 'log-green');
      checkValid();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function startAnalysis() {
  const btn = document.getElementById('runBtn');
  const apiKey = document.getElementById('apiKey').value.trim();
  const model = document.getElementById('modelName').value;
  
  btn.disabled = true;
  btn.innerText = "⏳ 執行中...";
  document.getElementById('resultTable').style.display = 'none';
  addLog("--- 開始比對流程 ---", "log-blue");

  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
  
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 60000); // 60秒超時

  const payload = {
    contents: [{
      parts: [
        { text: "比對兩張圖的梁配筋表。找出所有梁編號並核對主筋與箍筋。請僅輸出 JSON 格式：[{\"beam\":\"號碼\",\"status\":\"same/diff\",\"vA\":\"設計\",\"vB\":\"現場\",\"note\":\"說明\"}]" },
        { inline_data: { mime_type: "image/jpeg", data: imgData.A } },
        { inline_data: { mime_type: "image/jpeg", data: imgData.B } }
      ]
    }],
    generationConfig: { temperature: 0.1, maxOutputTokens: 2048 }
  };

  try {
    addLog("正在上傳數據至 Google API...", "log-blue");
    const response = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal: controller.signal
    });

    clearTimeout(timeoutId);
    const result = await response.json();

    if (!response.ok) {
      throw new Error(result.error?.message || "API 連線失敗");
    }

    addLog("✅ 收到 AI 回應，正在解析...", "log-green");
    const aiText = result.candidates[0].content.parts[0].text;
    const jsonStr = aiText.replace(/```json|```/g, "").trim();
    const data = JSON.parse(jsonStr);
    
    renderTable(data);
    addLog("任務成功完成", "log-green");

  } catch (err) {
    if (err.name === 'AbortError') {
      addLog("❌ 錯誤：API 回應超時 (60秒)，請嘗試換小一點的圖或改用 Gemini 1.5 Flash", "log-red");
    } else {
      addLog(`❌ 錯誤：${err.message}`, "log-red");
      console.error(err);
    }
  } finally {
    btn.disabled = false;
    btn.innerText = "開始 AI 比對分析";
  }
}

function renderTable(data) {
  const body = document.getElementById('resultBody');
  body.innerHTML = "";
  data.forEach(item => {
    const isDiff = item.status !== 'same';
    const row = `<tr class="${isDiff ? 'diff' : ''}">
      <td>${item.beam}</td>
      <td>${isDiff ? '差異' : '相同'}</td>
      <td>${item.vA}</td>
      <td>${item.vB}</td>
      <td>${item.note || ''}</td>
    </tr>`;
    body.innerHTML += row;
  });
  document.getElementById('resultTable').style.display = 'table';
}
</script>
</body>
</html>
