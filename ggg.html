<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配筋圖面核對系統 - Gemma 4 專用版</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0a1628;
    background-image: linear-gradient(rgba(74,158,255,0.07) 1px, transparent 1px), linear-gradient(90deg, rgba(74,158,255,0.07) 1px, transparent 1px);
    background-size: 40px 40px;
    font-family: 'Courier New', monospace;
    color: #c8deff;
    padding: 20px;
  }
  header { text-align: center; margin-bottom: 25px; border-bottom: 1px solid #1e4d8c; padding-bottom: 15px; }
  h1 { font-size: 20px; color: #fff; letter-spacing: 2px; }
  .field { margin-bottom: 15px; }
  .field-label { font-size: 11px; color: #4a9eff; font-weight: bold; margin-bottom: 5px; }
  input[type="password"], select {
    width: 100%; padding: 10px; background: rgba(0,0,0,0.3);
    border: 1px solid #1e4d8c; border-radius: 4px; color: #c8deff; font-size: 12px;
  }
  .upload-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
  .upload-box {
    border: 2px dashed #1e4d8c; border-radius: 8px; padding: 15px;
    text-align: center; cursor: pointer; background: rgba(30,77,140,0.08);
    min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .preview-img { max-width: 100%; max-height: 100px; border-radius: 4px; margin-bottom: 5px; }
  .go-btn {
    width: 100%; padding: 15px; background: #1e4d8c; border: 1px solid #4a9eff;
    color: #4a9eff; font-weight: bold; cursor: pointer; border-radius: 4px;
  }
  .go-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #logBox {
    background: rgba(0,0,0,0.5); border: 1px solid #1e4d8c; padding: 10px;
    font-size: 11px; max-height: 150px; overflow-y: auto; margin-top: 15px; border-radius: 4px;
  }
  .log-err { color: #ff5252; }
  .log-ok { color: #48c774; }
  #resultWrap { margin-top: 20px; display: none; }
  table { width: 100%; border-collapse: collapse; font-size: 11px; }
  th, td { padding: 8px; border: 1px solid #1e4d8c; text-align: left; }
  th { background: rgba(74,158,255,0.1); color: #4a9eff; }
  .diff { color: #ff5252; background: rgba(255,82,82,0.1); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { display: inline-block; width: 12px; height: 12px; border: 2px solid #ffcc4433; border-top-color: #ffcc44; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
</style>
</head>
<body>

<header>
  <h1>配筋圖面核對系統 (Gemma 4 優化版)</h1>
</header>

<div class="field">
  <div class="field-label">API KEY</div>
  <input type="password" id="apiKey" placeholder="在此輸入 AIza... 金鑰" oninput="checkReady()">
</div>

<div class="field">
  <div class="field-label">目前指定模型</div>
  <select id="model">
    <option value="gemma-4-26b-a4b-it">Gemma 4 26B (截圖顯示可用)</option>
    <option value="gemma-4-31b-it">Gemma 4 31B</option>
  </select>
</div>

<div class="upload-row">
  <div class="upload-box" onclick="document.getElementById('fA').click()">
    <div id="phA">圖 A (CAD)</div>
    <div id="pvA" style="display:none;"><img id="imgA" class="preview-img"></div>
    <input type="file" id="fA" accept="image/*" onchange="onFile(event,'A')" style="display:none;">
  </div>
  <div class="upload-box" onclick="document.getElementById('fB').click()">
    <div id="phB">圖 B (照片)</div>
    <div id="pvB" style="display:none;"><img id="imgB" class="preview-img"></div>
    <input type="file" id="fB" accept="image/*" onchange="onFile(event,'B')" style="display:none;">
  </div>
</div>

<button class="go-btn" id="goBtn" onclick="run()" disabled>▶ 開始比對</button>

<div id="logBox" style="display:none;"></div>

<div id="resultWrap">
  <table>
    <thead><tr><th>梁號</th><th>狀態</th><th>圖A</th><th>圖B</th><th>說明</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
const S = { b64A:null, b64B:null };

function log(msg, cls=''){
  const box = document.getElementById('logBox');
  box.style.display = 'block';
  box.innerHTML += `<div class="${cls}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
  box.scrollTop = 999;
}

function checkReady() {
  const key = document.getElementById('apiKey').value.trim();
  document.getElementById('goBtn').disabled = !(S.b64A && S.b64B && key);
}

function onFile(e, side) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if(w > 1800 || h > 1800) {
        const ratio = Math.min(1800/w, 1800/h);
        w *= ratio; h *= ratio;
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
      if(side === 'A') S.b64A = dataUrl.split(',')[1];
      else S.b64B = dataUrl.split(',')[1];
      document.getElementById('img'+side).src = dataUrl;
      document.getElementById('ph'+side).style.display = 'none';
      document.getElementById('pv'+side).style.display = 'block';
      checkReady();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

async function run() {
  const btn = document.getElementById('goBtn');
  const key = document.getElementById('apiKey').value.trim();
  const model = document.getElementById('model').value;
  
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>連線中...';
  document.getElementById('logBox').innerHTML = '';
  document.getElementById('resultWrap').style.display = 'none';

  log(`嘗試連線至 Gemma 4 (${model})...`);

  // 極簡化 Prompt 避免解析錯誤
  const prompt = "比對圖A與圖B。找出梁編號、主筋、箍筋。輸出 JSON 陣列: [{\"beam\":\"梁號\",\"status\":\"same/diff\",\"versionA\":\"內容A\",\"versionB\":\"內容B\",\"note\":\"備註\"}]";

  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;

  try {
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          parts: [
            { text: prompt },
            { inline_data: { mime_type: "image/jpeg", data: S.b64A } },
            { inline_data: { mime_type: "image/jpeg", data: S.b64B } }
          ]
        }],
        generationConfig: { 
          temperature: 0.1, 
          maxOutputTokens: 2048,
          response_mime_type: "application/json"
        }
      })
    });

    const data = await resp.json();
    if(!resp.ok) throw new Error(data.error?.message || 'API 傳回錯誤');

    log('✅ 取得資料，解析中...', 'log-ok');
    const rawText = data.candidates[0].content.parts[0].text;
    const cleanJson = rawText.replace(/```json|```/g, '').trim();
    const rows = JSON.parse(cleanJson);
    
    render(rows);
  } catch (e) {
    log('❌ 失敗: ' + e.message, 'log-err');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '▶ 開始比對';
  }
}

function render(rows) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = rows.map(r => `
    <tr class="${r.status !== 'same' ? 'diff' : ''}">
      <td>${r.beam}</td>
      <td>${r.status === 'same' ? '一致' : '差異'}</td>
      <td>${r.versionA}</td>
      <td>${r.versionB}</td>
      <td>${r.note || ''}</td>
    </tr>
  `).join('');
  document.getElementById('resultWrap').style.display = 'block';
}
</script>
</body>
</html>
