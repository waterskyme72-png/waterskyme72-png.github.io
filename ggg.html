<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配筋圖面核對系統 (修復版)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0a1628;
    background-image:
      linear-gradient(rgba(74,158,255,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74,158,255,0.07) 1px, transparent 1px);
    background-size: 40px 40px;
    font-family: 'Courier New', monospace;
    color: #c8deff;
    padding: 24px 16px;
  }
  header { text-align: center; margin-bottom: 28px; border-bottom: 1px solid #1e4d8c; padding-bottom: 18px; }
  .eyebrow { font-size: 11px; color: #4a9eff; letter-spacing: 4px; margin-bottom: 6px; }
  h1 { font-size: 22px; font-weight: bold; color: #fff; letter-spacing: 3px; }
  .sub { font-size: 11px; color: #4a9eff; letter-spacing: 2px; margin-top: 6px; }

  .field { margin-bottom: 18px; }
  .field-label { font-size: 10px; color: #4a9eff; letter-spacing: 2px; margin-bottom: 7px; text-transform: uppercase; font-weight: bold; }
  .field-hint { font-size: 10px; color: rgba(200,222,255,0.35); margin-top: 5px; letter-spacing: 1px; }

  input[type="password"], input[type="text"], select {
    width: 100%; padding: 10px 12px;
    background: rgba(0,0,0,0.3);
    border: 1px solid #1e4d8c;
    border-radius: 4px;
    color: #c8deff;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    outline: none;
  }
  
  .key-row { display: flex; gap: 8px; }
  .key-row input { flex: 1; }
  .vis-btn {
    background: none; border: 1px solid #1e4d8c; color: #4a9eff;
    padding: 0 12px; border-radius: 4px; cursor: pointer;
    font-family: 'Courier New', monospace; font-size: 11px; white-space: nowrap;
  }

  .upload-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
  .upload-box {
    border: 2px dashed #1e4d8c; border-radius: 8px; padding: 16px;
    text-align: center; cursor: pointer;
    background: rgba(30,77,140,0.08);
    min-height: 150px; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .upload-box:hover, .upload-box.has-img { border-color: #4a9eff; background: rgba(74,158,255,0.08); }
  .upload-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.5; }
  .upload-text { font-size: 11px; color: rgba(200,222,255,0.6); }
  .preview-img { max-width: 100%; max-height: 120px; object-fit: contain; border-radius: 4px; border: 1px solid #1e4d8c; }
  .clear-btn { background: none; border: none; color: rgba(200,222,255,0.35); cursor: pointer; font-size: 10px; text-decoration: underline; margin-top: 5px; }
  input[type="file"] { display: none; }

  .go-btn {
    width: 100%; padding: 14px; background: transparent;
    border: 2px solid #4a9eff; color: #4a9eff;
    font-family: 'Courier New', monospace; font-size: 13px;
    letter-spacing: 3px; cursor: pointer; border-radius: 4px;
    margin-bottom: 18px; font-weight: bold;
  }
  .go-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  #logWrap { display: none; margin-bottom: 18px; }
  #logBox {
    background: rgba(0,0,0,0.4); border: 1px solid #1e4d8c;
    border-radius: 4px; padding: 10px 12px;
    font-size: 11px; line-height: 1.8;
    max-height: 180px; overflow-y: auto;
  }
  .log-ok { color: #c8deff; }
  .log-error { color: #ff5252; }
  .log-success { color: #48c774; }

  #resultWrap { display: none; }
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 16px; }
  th { padding: 8px 10px; background: rgba(30,77,140,0.5); border: 1px solid #1e4d8c; color: #4a9eff; text-align: left; }
  td { padding: 7px 10px; border: 1px solid rgba(30,77,140,0.4); }
  .c-diff { color: #ff5252; background: rgba(255,82,82,0.05); }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { display: inline-block; width: 10px; height: 10px; border: 2px solid rgba(255,204,68,0.3); border-top-color: #ffcc44; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 6px; }
</style>
</head>
<body>

<header>
  <div class="eyebrow">STRUCTURAL DRAWING</div>
  <h1>配筋圖面核對系統</h1>
  <div class="sub">V1.1 - 修正 Internal Error 問題</div>
</header>

<div class="field">
  <div class="field-label">API Key</div>
  <div class="key-row">
    <input type="password" id="apiKey" placeholder="AIza..." oninput="checkReady()">
    <button class="vis-btn" onclick="toggleVis()">顯示</button>
  </div>
</div>

<div class="field">
  <div class="field-label">模型選擇</div>
  <select id="model">
    <option value="gemini-1.5-flash" selected>gemini-1.5-flash (最穩定推薦)</option>
    <option value="gemini-1.5-flash-8b">gemini-1.5-flash-8b (快)</option>
    <option value="gemini-2.0-flash">gemini-2.0-flash</option>
  </select>
</div>

<div class="upload-row">
  <div>
    <div class="field-label">圖 A（CAD）</div>
    <div class="upload-box" id="boxA" onclick="document.getElementById('fA').click()">
      <div id="phA">📤 上傳</div>
      <div id="pvA" style="display:none;"><img id="imgA" class="preview-img"><button class="clear-btn" onclick="clearFile(event,'A')">移除</button></div>
    </div>
    <input type="file" id="fA" accept="image/*" onchange="onFile(event,'A')">
  </div>
  <div>
    <div class="field-label">圖 B（照片）</div>
    <div class="upload-box" id="boxB" onclick="document.getElementById('fB').click()">
      <div id="phB">📤 上傳</div>
      <div id="pvB" style="display:none;"><img id="imgB" class="preview-img"><button class="clear-btn" onclick="clearFile(event,'B')">移除</button></div>
    </div>
    <input type="file" id="fB" accept="image/*" onchange="onFile(event,'B')">
  </div>
</div>

<button class="go-btn" id="goBtn" onclick="run()" disabled>▶ 開始比對</button>

<div id="logWrap">
  <div id="logBox"></div>
</div>

<div id="resultWrap">
  <div class="tbl-wrap">
    <table>
      <thead><tr><th>梁編號</th><th>狀態</th><th>圖 A</th><th>圖 B</th><th>備註</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
const S = { b64A:null, mimeA:'image/jpeg', b64B:null, mimeB:'image/jpeg' };

function log(msg, cls='log-ok'){
  document.getElementById('logWrap').style.display = 'block';
  const box = document.getElementById('logBox');
  box.innerHTML += `<div class="${cls}">${msg}</div>`;
  box.scrollTop = 999;
}

function compressImage(file){
  return new Promise((ok) => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      const MAX = 1600; // 降低解析度以避免 API 負荷過重
      if(w > MAX || h > MAX){
        if(w > h){ h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      const dataUrl = c.toDataURL('image/jpeg', 0.85);
      ok({ b64: dataUrl.split(',')[1], mime: 'image/jpeg' });
    };
    img.src = URL.createObjectURL(file);
  });
}

function loadFile(file, side){
  compressImage(file).then(r => {
    if(side === 'A'){ S.b64A = r.b64; S.mimeA = r.mime; document.getElementById('imgA').src = `data:${r.mime};base64,${r.b64}`; }
    else { S.b64B = r.b64; S.mimeB = r.mime; document.getElementById('imgB').src = `data:${r.mime};base64,${r.b64}`; }
    document.getElementById('ph'+side).style.display = 'none';
    document.getElementById('pv'+side).style.display = 'block';
    checkReady();
  });
}

function onFile(e, side){ if(e.target.files[0]) loadFile(e.target.files[0], side); }

function clearFile(e, side){
  e.stopPropagation();
  if(side==='A') S.b64A=null; else S.b64B=null;
  document.getElementById('ph'+side).style.display = 'block';
  document.getElementById('pv'+side).style.display = 'none';
  checkReady();
}

function checkReady(){
  const key = document.getElementById('apiKey').value.trim();
  document.getElementById('goBtn').disabled = !(S.b64A && S.b64B && key);
}

function toggleVis(){
  const inp = document.getElementById('apiKey');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

async function run(){
  const btn = document.getElementById('goBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>AI 分析中...';
  
  document.getElementById('logBox').innerHTML = '';
  document.getElementById('resultWrap').style.display = 'none';

  const model = document.getElementById('model').value;
  const key = document.getElementById('apiKey').value.trim();
  
  log('正在清理數據並發送請求...');

  const prompt = "你是一位資深結構工程師。請比對圖A（設計圖）與圖B（現場照片或另一份圖紙）中的配筋數據。重點檢查梁編號、主筋、箍筋。請僅輸出 JSON 格式陣列，格式如下：[{\"beam\":\"梁號\",\"status\":\"same/diff/unclear\",\"versionA\":\"圖A內容\",\"versionB\":\"圖B內容\",\"note\":\"差異\"}]";

  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
  
  try {
    const response = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          parts: [
            { text: prompt },
            { inline_data: { mime_type: S.mimeA, data: S.b64A } },
            { inline_data: { mime_type: S.mimeB, data: S.b64B } }
          ]
        }],
        generationConfig: { temperature: 0.1, maxOutputTokens: 2048 }
      })
    });

    const data = await response.json();
    if(!response.ok) throw new Error(data.error?.message || '未知錯誤');

    const text = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
    const rows = JSON.parse(text);
    
    renderTable(rows);
    log('✅ 比對完成', 'log-success');
  } catch (e) {
    log('❌ 錯誤: ' + e.message, 'log-error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '▶ 開始比對';
  }
}

function renderTable(rows){
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td>${r.beam}</td>
      <td style="color:${r.status==='same'?'#48c774':'#ff5252'}">${r.status.toUpperCase()}</td>
      <td class="${r.status!=='same'?'c-diff':''}">${r.versionA}</td>
      <td class="${r.status!=='same'?'c-diff':''}">${r.versionB}</td>
      <td>${r.note}</td>
    </tr>
  `).join('');
  document.getElementById('resultWrap').style.display = 'block';
}
</script>
</body>
</html>
