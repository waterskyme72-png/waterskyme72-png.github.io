<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gemma4 結構圖 OCR 強化版</title>

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  background:#0a1628;
  color:#c8deff;
  font-family:'Segoe UI',sans-serif;
  padding:20px;
}

.container{
  max-width:1300px;
  margin:auto;
}

h1{
  text-align:center;
  margin-bottom:25px;
  color:#fff;
}

.field{
  margin-bottom:20px;
}

label{
  display:block;
  margin-bottom:8px;
  color:#4a9eff;
  font-size:12px;
  font-weight:bold;
}

input,select{
  width:100%;
  padding:12px;
  background:#000;
  border:1px solid #1e4d8c;
  color:#fff;
  border-radius:5px;
}

.drop-zone{
  border:2px dashed #1e4d8c;
  height:260px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  border-radius:8px;
  transition:0.3s;
  background:rgba(30,77,140,0.08);
}

.drop-zone:hover{
  border-color:#4a9eff;
  background:rgba(74,158,255,0.12);
}

.preview{
  max-width:95%;
  max-height:220px;
  display:none;
  margin-top:10px;
  border:1px solid #4a9eff;
}

.btn-run{
  width:100%;
  padding:18px;
  background:#1e4d8c;
  border:1px solid #4a9eff;
  color:#fff;
  font-size:18px;
  font-weight:bold;
  border-radius:5px;
  cursor:pointer;
  transition:0.3s;
}

.btn-run:hover:not(:disabled){
  background:#2a6bbd;
}

.btn-run:disabled{
  opacity:0.4;
  cursor:not-allowed;
}

#statusLog{
  margin-top:20px;
  background:#000;
  border:1px solid #1e4d8c;
  padding:12px;
  max-height:250px;
  overflow-y:auto;
  font-size:12px;
  line-height:1.7;
}

.log-blue{
  color:#4a9eff;
}

.log-red{
  color:#ff5a5a;
}

.log-green{
  color:#48c774;
}

#result{
  margin-top:25px;
  background:#111;
  border:1px solid #1e4d8c;
  padding:15px;
  white-space:pre-wrap;
  line-height:1.7;
  display:none;
  max-height:700px;
  overflow:auto;
}

#chunkPreview{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-top:20px;
}

.chunk-box{
  border:1px solid #1e4d8c;
  padding:8px;
  background:#111;
}

.chunk-box img{
  width:100%;
  border:1px solid #333;
}

.chunk-title{
  margin-bottom:6px;
  color:#4a9eff;
  font-size:11px;
}

</style>
</head>

<body>

<div class="container">

<h1>Gemma4 結構圖 OCR 強化版</h1>

<div class="field">

<label>GOOGLE AI API KEY</label>

<input
  type="password"
  id="apiKey"
  placeholder="輸入 AIza..."
  oninput="checkReady()"
/>

</div>

<div class="field">

<label>Gemma 4 模型</label>

<select id="modelName">

<option value="gemma-4-26b-a4b-it">
gemma-4-26b-a4b-it
</option>

<option value="gemma-4-31b-it">
gemma-4-31b-it
</option>

</select>

</div>

<div
  class="drop-zone"
  onclick="document.getElementById('fileInput').click()"
>

<div id="uploadText">
📷 上傳結構圖
</div>

<img id="preview" class="preview">

<input
  type="file"
  id="fileInput"
  hidden
  accept="image/*"
  onchange="handleFile(this)"
>

</div>

<br>

<button
  id="runBtn"
  class="btn-run"
  onclick="runOCR()"
  disabled
>
▶ 開始 OCR
</button>

<div id="statusLog">
系統就緒
</div>

<div id="chunkPreview"></div>

<div id="result"></div>

</div>

<script>

let originalImage = null;

function addLog(msg, cls=''){

  const log =
    document.getElementById('statusLog');

  log.innerHTML += `
    <div class="${cls}">
      [${new Date().toLocaleTimeString()}]
      ${msg}
    </div>
  `;

  log.scrollTop = log.scrollHeight;
}

function checkReady(){

  const key =
    document.getElementById('apiKey')
    .value
    .trim();

  document.getElementById('runBtn').disabled =
    !(key && originalImage);
}

function handleFile(input){

  const file = input.files[0];

  if(!file) return;

  const reader = new FileReader();

  reader.onload = (e)=>{

    const img = new Image();

    img.onload = ()=>{

      originalImage = img;

      document.getElementById('preview').src =
        e.target.result;

      document.getElementById('preview').style.display =
        'block';

      document.getElementById('uploadText').style.display =
        'none';

      addLog(
        `圖片載入完成 (${img.width} x ${img.height})`,
        'log-green'
      );

      checkReady();
    };

    img.src = e.target.result;
  };

  reader.readAsDataURL(file);
}

// 改為灰階，不做二值化
function preprocessCanvas(ctx, width, height){

  const imageData =
    ctx.getImageData(0,0,width,height);

  const data = imageData.data;

  for(let i=0;i<data.length;i+=4){

    const avg =
      (
        data[i] +
        data[i+1] +
        data[i+2]
      ) / 3;

    data[i] = avg;
    data[i+1] = avg;
    data[i+2] = avg;
  }

  ctx.putImageData(imageData,0,0);
}

function splitImageIntoChunks(img){

  const chunks = [];

  // 改為 4x4
  const rows = 4;
  const cols = 4;

  // overlap
  const overlap = 120;

  const chunkWidth =
    Math.floor(img.width / cols);

  const chunkHeight =
    Math.floor(img.height / rows);

  const previewArea =
    document.getElementById('chunkPreview');

  previewArea.innerHTML = '';

  let index = 1;

  for(let y=0;y<rows;y++){

    for(let x=0;x<cols;x++){

      const sx =
        Math.max(
          0,
          x * chunkWidth - overlap
        );

      const sy =
        Math.max(
          0,
          y * chunkHeight - overlap
        );

      const ex =
        Math.min(
          img.width,
          (x+1)*chunkWidth + overlap
        );

      const ey =
        Math.min(
          img.height,
          (y+1)*chunkHeight + overlap
        );

      const sw = ex - sx;
      const sh = ey - sy;

      const canvas =
        document.createElement('canvas');

      canvas.width = sw;
      canvas.height = sh;

      const ctx =
        canvas.getContext('2d');

      ctx.drawImage(
        img,

        sx,
        sy,

        sw,
        sh,

        0,
        0,

        sw,
        sh
      );

      preprocessCanvas(
        ctx,
        sw,
        sh
      );

      const base64 =
        canvas.toDataURL(
          'image/jpeg',
          0.95
        );

      chunks.push(
        base64.split(',')[1]
      );

      const div =
        document.createElement('div');

      div.className = 'chunk-box';

      div.innerHTML = `
        <div class="chunk-title">
          區塊 ${index}
        </div>

        <img src="${base64}">
      `;

      previewArea.appendChild(div);

      index++;
    }
  }

  return chunks;
}

async function ocrChunk(base64, index){

  const apiKey =
    document.getElementById('apiKey')
    .value
    .trim();

  const model =
    document.getElementById('modelName')
    .value;

  const url =
    `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

  addLog(
    `區塊 ${index} OCR中`,
    'log-blue'
  );

  const response =
    await fetch(url,{

      method:'POST',

      headers:{
        'Content-Type':'application/json'
      },

      body:JSON.stringify({

        contents:[{

          parts:[

            {
              text:
`
Extract all beam reinforcement text.

Output plain text only.
`
            },

            {
              inline_data:{
                mime_type:'image/jpeg',
                data:base64
              }
            }

          ]
        }],

        generationConfig:{

          temperature:0.1,

          maxOutputTokens:384
        }

      })
    });

  const result =
    await response.json();

  console.log(
    `區塊 ${index}`,
    result
  );

  if(!response.ok){

    throw new Error(
      `區塊 ${index} API錯誤`
    );
  }

  const text =
    result.candidates?.[0]
    ?.content?.parts?.[0]
    ?.text || '';

  if(!text){

    throw new Error(
      `區塊 ${index} 無文字`
    );
  }

  addLog(
    `區塊 ${index} 完成`,
    'log-green'
  );

  return `
========== 區塊 ${index} ==========

${text}

`;
}

async function runOCR(){

  const btn =
    document.getElementById('runBtn');

  const resultDiv =
    document.getElementById('result');

  btn.disabled = true;

  btn.innerText =
    '⏳ OCR 中...';

  resultDiv.style.display='none';

  try{

    addLog(
      '開始切塊',
      'log-blue'
    );

    const chunks =
      splitImageIntoChunks(originalImage);

    addLog(
      `完成 ${chunks.length} 區塊`,
      'log-green'
    );

    let finalText = '';

    for(let i=0;i<chunks.length;i++){

      try{

        const text =
          await ocrChunk(
            chunks[i],
            i+1
          );

        finalText += text;
      }
      catch(err){

        console.error(err);

        addLog(
          err.message,
          'log-red'
        );

        finalText += `
========== 區塊 ${i+1} ==========
OCR失敗

`;
      }
    }

    resultDiv.innerText =
      finalText;

    resultDiv.style.display='block';

    addLog(
      '全部完成',
      'log-green'
    );
  }
  catch(err){

    console.error(err);

    addLog(
      err.message,
      'log-red'
    );
  }
  finally{

    btn.disabled = false;

    btn.innerText =
      '▶ 開始 OCR';
  }
}

</script>

</body>
</html>
