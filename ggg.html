<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梁配筋核對系統 - 強度穩定版</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a1628; color: #c8deff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px;
    background-image: linear-gradient(rgba(74,158,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(74,158,255,0.05) 1px, transparent 1px);
    background-size: 30px 30px;
  }
  .container { max-width: 900px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #1e4d8c; }
  h1 { font-size: 24px; color: #fff; letter-spacing: 2px; }
  .field { margin-bottom: 20px; }
  label { display: block; font-size: 12px; color: #4a9eff; margin-bottom: 8px; font-weight: bold; letter-spacing: 1px; }
  input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #1e4d8c; color: #fff; border-radius: 4px; font-size: 14px; }
  .upload-area { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
  .drop-zone {
    border: 2px dashed #1e4d8c; height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; background: rgba(30,77,140,0.1); border-radius: 8px; transition: 0.3s;
  }
  .drop-zone:hover { border-color: #4a9eff; background: rgba(74,158,255,0.1); }
  .preview { max-width: 95%; max-height: 120px; display: none; margin-top: 5px; border: 1px solid #4a9eff; }
  .btn-run {
    width: 100%; padding: 18px; background: #1e4d8c; border: 1px solid #4a9eff;
    color: #fff; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 18px; transition: 0.3s;
  }
  .btn-run:hover:not(:disabled) { background: #2a6bbd; }
  .btn-run:disabled { opacity: 0.3; cursor: not-allowed; }

  #statusLog {
    margin-top: 20px; background: #000; border: 1px solid #1e4d8c; padding: 12px;
    font-size: 12px; max-height: 150px; overflow-y: auto; color: #aaa; line-height: 1.6;
  }
  #debugArea {
    margin-top: 15px; background: #1a1a1a; border: 1px solid #444; padding: 12px;
    font-size: 11px; color: #00ff00; white-space: pre-wrap; display: none; max-height: 200px; overflow-y: auto;
  }
  .log-blue { color: #4a9eff; }
  .log-red { color: #ff5252; }
  .log-green { color: #48c774; }
  
  table { width: 100%; border-collapse: collapse; margin-top: 25px; display: none; background: rgba(0,0,0,0.3); }
  th, td { border: 1px solid #1e4d8c; padding: 12px; text-align: left; }
  th { background: rgba(74,158,255,0.15); color: #4a9eff; font-size: 13px; }
  tr.diff { background: rgba(255,82,82,0.1); }
  .status-tag { padding: 2px 6px; border-radius: 3px; font-size: 11px; font-weight: bold; }
  .tag-same { background: #234d31; color: #48c774; }
  .tag-diff { background: #4d2323; color: #ff5252; }
</style>
</head>
<body>

<div class="container">
  <header><h1>梁配筋核對系統 (Gemma 4 穩定版)</h1></header>

  <div class="field">
    <label>GOOGLE AI API KEY</label>
    <input type="password" id="apiKey" placeholder="輸入您的 AIza... 金鑰" oninput="checkReady()">
  </div>

  <div class="field">
    <label>模型名稱 (實驗性模型運算較久，請耐心等候)</label>
    <select id="modelName">
      <option value="gemma-4-26b-a4b-it">Gemma 4 26B (截圖顯示流量模型)</option>
      <option value="gemma-4-31b-it">Gemma 4 31B (Dense-IT)</option>
      <option value="gemini-1.5-flash">Gemini 1.5 Flash (最快，如超時請改用此模型)</option>
    </select>
  </div>

  <div class="upload-area">
    <div class="drop-zone" onclick="document.getElementById('fileA').click()">
      <div id="textA">📐 上傳圖 A (CAD 設計圖)</div>
      <img id="prevA" class="preview">
      <input type="file" id="fileA" hidden accept="image/*" onchange="handleFile(this, 'A')">
    </div>
    <div class="drop-zone" onclick="document.getElementById('fileB').click()">
      <div id="textB">📷 上傳圖 B (現場照片/紙本)</div>
      <img id="prevB" class="preview">
      <input type="file" id="fileB" hidden accept="image/*" onchange="handleFile(this, 'B')">
    </div>
  </div>

  <button id="runBtn" class="btn-run" onclick="runAnalysis()" disabled>▶ 開始 AI 比對分析</button>

  <div id="statusLog">系統就緒。請上傳兩張圖檔並輸入 API Key。</div>
  
  <div id="debugArea"></div>

  <table id="resultTable">
    <thead>
      <tr><th>梁編號</th><th>比對結果</th><th>圖 A (設計)</th><th>圖 B (現場)</th><th>備註</th></tr>
    </thead>
    <tbody id="resultBody"></tbody>
  </table>
</div>

<script>
let imgData = { A: null, B: null };

function addLog(msg, cls = '') {
  const log = document.getElementById('statusLog');
  log.innerHTML += `<div class="${cls}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
  log.scrollTop = log.scrollHeight;
}

function checkReady() {
  const key = document.getElementById('apiKey').value.trim();
  document.getElementById('runBtn').disabled = !(imgData.A && imgData.B && key);
}

function handleFile(input, side) {
  const file = input.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      const MAX = 1200; // 維持足夠辨識文字的解析度
      if (w > MAX || h > MAX) {
        const r = Math.min(MAX/w, MAX/h);
        w *= r; h *= r;
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      
      const b64 = canvas.toDataURL('image/jpeg', 0.85);
      imgData[side] = b64.split(',')[1];
      
      document.getElementById('prev' + side).src = b64;
      document.getElementById('prev' + side).style.display = 'block';
      document.getElementById('text' + side).style.display = 'none';
      addLog(`圖檔 ${side} 處理完成。`, 'log-green');
      checkReady();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function runAnalysis() {
  const btn = document.getElementById('runBtn');
  const apiKey = document.getElementById('apiKey').value.trim();
  const model = document.getElementById('modelName').value;
  const debug = document.getElementById('debugArea');
  
  btn.disabled = true;
  btn.innerText = "⏳ AI 正在運算，請勿離開...";
  document.getElementById('resultTable').style.display = 'none';
  debug.style.display = 'none';
  addLog(`正在連線至 ${model}，此步驟可能耗時 1-3 分鐘...`, "log-blue");

  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
  
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 180000); // 延長至 180 秒

  try {
    const response = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          parts: [
            { text: "你是結構工程師。請比對圖A與圖B的梁配筋表。找出所有梁號，並核對主筋與箍筋。請『僅』輸出 JSON 陣列格式，不要說任何廢話。格式：[{\"beam\":\"梁號\",\"status\":\"same/diff\",\"vA\":\"圖A內容\",\"vB\":\"圖B內容\",\"note\":\"差異說明\"}]" },
            { inline_data: { mime_type: "image/jpeg", data: imgData.A } },
            { inline_data: { mime_type: "image/jpeg", data: imgData.B } }
          ]
        }],
        generationConfig: { temperature: 0.1, maxOutputTokens: 4096 }
      }),
      signal: controller.signal
    });

    clearTimeout(timeoutId);
    const result = await response.json();

    if (!response.ok) throw new Error(result.error?.message || "連線異常");

    const rawText = result.candidates[0].content.parts[0].text;
    
    // 顯示原始輸出供偵錯
    debug.innerText = "【AI 原始回應內容】：\n" + rawText;
    debug.style.display = 'block';
    addLog("✅ 已接收到回應內容，嘗試解析 JSON...", "log-green");

    const jsonStr = rawText.replace(/```json|```/g, "").trim();
    const data = JSON.parse(jsonStr);
    
    renderTable(data);
    addLog("分析完成！", "log-green");

  } catch (err) {
    if (err.name === 'AbortError') {
      addLog("❌ 逾時報錯：模型運算超過 180 秒，可能是伺服器繁忙。建議改用 Gemini 1.5 Flash 測試。", "log-red");
    } else {
      addLog(`❌ 報錯：${err.message}`, "log-red");
    }
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.innerText = "▶ 開始 AI 比對分析";
  }
}

function renderTable(data) {
  const body = document.getElementById('resultBody');
  body.innerHTML = "";
  data.forEach(item => {
    const isDiff = item.status === 'diff';
    const row = `<tr class="${isDiff ? 'diff' : ''}">
      <td><strong>${item.beam}</strong></td>
      <td><span class="status-tag ${isDiff ? 'tag-diff' : 'tag-same'}">${isDiff ? '差異' : '一致'}</span></td>
      <td>${item.vA}</td>
      <td>${item.vB}</td>
      <td>${item.note || ''}</td>
    </tr>`;
    body.innerHTML += row;
  });
  document.getElementById('resultTable').style.display = 'table';
}
</script>
</body>
</html>
