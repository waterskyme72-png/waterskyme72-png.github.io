<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gemma4 單圖 OCR 測試</title>

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  background:#0a1628;
  color:#c8deff;
  font-family:'Segoe UI',sans-serif;
  padding:20px;
}

.container{
  max-width:900px;
  margin:auto;
}

h1{
  text-align:center;
  margin-bottom:25px;
  color:#fff;
}

.field{
  margin-bottom:20px;
}

label{
  display:block;
  margin-bottom:8px;
  color:#4a9eff;
  font-size:12px;
  font-weight:bold;
}

input,select{
  width:100%;
  padding:12px;
  background:#000;
  border:1px solid #1e4d8c;
  color:#fff;
  border-radius:5px;
}

.drop-zone{

  border:2px dashed #1e4d8c;

  height:220px;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  cursor:pointer;

  border-radius:8px;

  transition:0.3s;

  background:rgba(30,77,140,0.08);
}

.drop-zone:hover{

  border-color:#4a9eff;

  background:rgba(74,158,255,0.12);
}

.preview{

  max-width:95%;
  max-height:180px;

  display:none;

  margin-top:10px;

  border:1px solid #4a9eff;
}

.btn-run{

  width:100%;

  padding:18px;

  background:#1e4d8c;

  border:1px solid #4a9eff;

  color:#fff;

  font-size:18px;

  font-weight:bold;

  border-radius:5px;

  cursor:pointer;

  transition:0.3s;
}

.btn-run:hover:not(:disabled){

  background:#2a6bbd;
}

.btn-run:disabled{

  opacity:0.4;
  cursor:not-allowed;
}

#statusLog{

  margin-top:20px;

  background:#000;

  border:1px solid #1e4d8c;

  padding:12px;

  max-height:200px;

  overflow-y:auto;

  font-size:12px;

  line-height:1.6;
}

.log-blue{
  color:#4a9eff;
}

.log-red{
  color:#ff5a5a;
}

.log-green{
  color:#48c774;
}

#result{

  margin-top:25px;

  background:#111;

  border:1px solid #1e4d8c;

  padding:15px;

  white-space:pre-wrap;

  line-height:1.7;

  display:none;
}

</style>
</head>

<body>

<div class="container">

<h1>Gemma4 單圖 OCR 測試</h1>

<div class="field">

<label>GOOGLE AI API KEY</label>

<input
  type="password"
  id="apiKey"
  placeholder="輸入 AIza..."
  oninput="checkReady()"
/>

</div>

<div class="field">

<label>Gemma 4 模型</label>

<select id="modelName">

  <option value="gemma-4-26b-a4b-it">
    gemma-4-26b-a4b-it
  </option>

  <option value="gemma-4-31b-it">
    gemma-4-31b-it
  </option>

</select>

</div>

<div
  class="drop-zone"
  onclick="document.getElementById('fileInput').click()"
>

<div id="uploadText">
📷 上傳梁配筋圖
</div>

<img id="preview" class="preview">

<input
  type="file"
  id="fileInput"
  hidden
  accept="image/*"
  onchange="handleFile(this)"
>

</div>

<br>

<button
  id="runBtn"
  class="btn-run"
  onclick="runOCR()"
  disabled
>
▶ 開始 OCR
</button>

<div id="statusLog">
系統就緒
</div>

<div id="result"></div>

</div>

<script>

let imageBase64 = null;

function addLog(msg, cls=''){

  const log =
    document.getElementById('statusLog');

  log.innerHTML += `
    <div class="${cls}">
      [${new Date().toLocaleTimeString()}]
      ${msg}
    </div>
  `;

  log.scrollTop = log.scrollHeight;
}

function checkReady(){

  const key =
    document.getElementById('apiKey')
    .value
    .trim();

  document.getElementById('runBtn').disabled =
    !(key && imageBase64);
}

function handleFile(input){

  const file = input.files[0];

  if(!file) return;

  const reader = new FileReader();

  reader.onload = (e)=>{

    const img = new Image();

    img.onload = ()=>{

      const canvas =
        document.createElement('canvas');

      let w = img.width;
      let h = img.height;

      // 降低解析度避免 Gemma 崩潰
      const MAX = 768;

      if(w > MAX || h > MAX){

        const ratio =
          Math.min(MAX/w, MAX/h);

        w *= ratio;
        h *= ratio;
      }

      canvas.width = w;
      canvas.height = h;

      const ctx =
        canvas.getContext('2d');

      ctx.drawImage(img,0,0,w,h);

      // 強壓縮
      const base64 =
        canvas.toDataURL('image/jpeg',0.6);

      imageBase64 =
        base64.split(',')[1];

      document.getElementById('preview').src =
        base64;

      document.getElementById('preview').style.display =
        'block';

      document.getElementById('uploadText').style.display =
        'none';

      addLog(
        '圖片處理完成',
        'log-green'
      );

      checkReady();
    };

    img.src = e.target.result;
  };

  reader.readAsDataURL(file);
}

async function runOCR(){

  const btn =
    document.getElementById('runBtn');

  const apiKey =
    document.getElementById('apiKey')
    .value
    .trim();

  const model =
    document.getElementById('modelName')
    .value;

  const resultDiv =
    document.getElementById('result');

  btn.disabled = true;

  btn.innerText =
    '⏳ Gemma OCR 中...';

  resultDiv.style.display='none';

  addLog(
    `正在連線 ${model}`,
    'log-blue'
  );

  const url =
    `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

  const controller =
    new AbortController();

  const timeoutId =
    setTimeout(
      ()=>controller.abort(),
      180000
    );

  try{

    const response =
      await fetch(url,{

      method:'POST',

      headers:{
        'Content-Type':'application/json'
      },

      body:JSON.stringify({

        contents:[{

          parts:[

            {
              text:
`
請辨識這張圖片中的所有文字。

這是工程梁配筋圖。

請完整輸出：

1. 梁號
2. 主筋
3. 箍筋

不要分析。
不要JSON。
只輸出辨識到的文字。
`
            },

            {
              inline_data:{
                mime_type:'image/jpeg',
                data:imageBase64
              }
            }

          ]
        }],

        generationConfig:{

          temperature:0.1,

          maxOutputTokens:512
        }

      }),

      signal:controller.signal
    });

    clearTimeout(timeoutId);

    const result =
      await response.json();

    console.log(result);

    if(!response.ok){

      throw new Error(
        result.error?.message ||
        'API 錯誤'
      );
    }

    if(!result.candidates){

      console.error(result);

      throw new Error(
        '沒有 candidates'
      );
    }

    if(!result.candidates.length){

      console.error(result);

      throw new Error(
        'candidates 為空'
      );
    }

    const text =
      result.candidates?.[0]
      ?.content?.parts?.[0]
      ?.text;

    if(!text){

      console.error(result);

      throw new Error(
        'Gemma 沒有回傳文字'
      );
    }

    resultDiv.innerText = text;

    resultDiv.style.display='block';

    addLog(
      'OCR 完成',
      'log-green'
    );
  }
  catch(err){

    console.error(err);

    if(err.name === 'AbortError'){

      addLog(
        '模型逾時',
        'log-red'
      );
    }
    else{

      addLog(
        err.message,
        'log-red'
      );
    }
  }
  finally{

    btn.disabled = false;

    btn.innerText =
      '▶ 開始 OCR';
  }
}

</script>

</body>
</html>
