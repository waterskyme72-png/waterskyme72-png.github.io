<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣封測族群即時儀表板（修正版）</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#080d14;
  color:#e2e8f0;
  font-family:Arial,sans-serif;
  min-height:100vh;
}
.grid-bg{
  position:fixed;inset:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(56,189,248,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(56,189,248,.04) 1px,transparent 1px);
  background-size:40px 40px;
}
header{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  padding:20px;
  border-bottom:1px solid #1e293b;
  flex-wrap:wrap;
  gap:10px;
}
h1{font-size:1.4rem}
.header-right{display:flex;gap:10px;align-items:center}
.refresh-btn{
  background:#1e293b;
  color:#fff;
  border:1px solid #334155;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
}
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:16px;
  padding:20px;
}
.card{
  background:#0d1727;
  border:1px solid #1e293b;
  border-radius:14px;
  padding:18px;
}
.card-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
}
.card-name{
  font-size:1.2rem;
  font-weight:bold;
}
.price{
  font-size:2rem;
  margin:12px 0;
  font-weight:bold;
}
.up{color:#34d399}
.down{color:#f87171}
.flat{color:#cbd5e1}
.metrics{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:12px;
}
.metric{
  background:#0f172a;
  border:1px solid #1e293b;
  border-radius:8px;
  padding:10px;
}
.metric-label{
  color:#94a3b8;
  font-size:.75rem;
  margin-bottom:4px;
}
.metric-val{
  font-weight:bold;
}
.loading{
  text-align:center;
  padding:40px;
  color:#38bdf8;
}
.error{
  margin:20px;
  padding:14px;
  border-radius:10px;
  background:#450a0a;
  color:#fecaca;
  display:none;
}
footer{
  padding:20px;
  color:#64748b;
  font-size:.8rem;
}
</style>
</head>

<body>
<div class="grid-bg"></div>

<header>
  <div>
    <div style="color:#38bdf8;font-size:.8rem;margin-bottom:6px">
      Yahoo Finance 即時公開 API
    </div>
    <h1>台灣封測族群 即時儀表板</h1>
  </div>

  <div class="header-right">
    <span id="updateTime">載入中...</span>
    <button class="refresh-btn" onclick="fetchAll()">重新整理</button>
  </div>
</header>

<div class="error" id="err"></div>

<div class="loading" id="loading">
  正在抓取即時資料...
</div>

<div class="cards" id="cards"></div>

<footer>
資料來源：Yahoo Finance 公開 API（即時報價）<br>
每 60 秒自動更新一次
</footer>

<script>

const STOCKS = [
  {
    code:'3711',
    symbol:'3711.TW',
    name:'日月光投控',
    epsGrowth:89,
    analyst:400
  },
  {
    code:'6239',
    symbol:'6239.TW',
    name:'力成',
    epsGrowth:47,
    analyst:265
  },
  {
    code:'2449',
    symbol:'2449.TW',
    name:'京元電子',
    epsGrowth:10,
    analyst:350
  },
  {
    code:'8150',
    symbol:'8150.TW',
    name:'南茂',
    epsGrowth:3,
    analyst:null
  },
  {
    code:'6257',
    symbol:'6257.TWO',
    name:'矽格',
    epsGrowth:39,
    analyst:125
  },
  {
    code:'3264',
    symbol:'3264.TWO',
    name:'欣銓',
    epsGrowth:20,
    analyst:null
  }
];

function fmt(v,d=2){
  if(v===null || v===undefined || isNaN(v)) return '—';
  return Number(v).toFixed(d);
}

function pegColor(peg){
  if(!peg || peg <= 0) return '#94a3b8';
  if(peg < 0.6) return '#34d399';
  if(peg < 1.0) return '#86efac';
  if(peg < 2.0) return '#fbbf24';
  return '#f87171';
}

async function fetchQuote(symbol){

  const url =
    `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbol}`;

  const res = await fetch(url);

  if(!res.ok){
    throw new Error(symbol + ' API 失敗');
  }

  const data = await res.json();

  return data.quoteResponse.result[0];
}

async function fetchAll(){

  document.getElementById('err').style.display='none';

  try{

    const results = await Promise.all(
      STOCKS.map(async stock => {

        try{

          const q = await fetchQuote(stock.symbol);

          return {
            ...stock,
            price:q.regularMarketPrice,
            change:q.regularMarketChange,
            changePct:q.regularMarketChangePercent,
            open:q.regularMarketOpen,
            high:q.regularMarketDayHigh,
            low:q.regularMarketDayLow,
            volume:q.regularMarketVolume,
            pe:q.trailingPE
          };

        }catch(err){

          return {
            ...stock,
            error:true
          };

        }

      })
    );

    render(results);

    document.getElementById('updateTime').textContent =
      '最後更新：' + new Date().toLocaleTimeString('zh-TW');

  }catch(err){

    const el = document.getElementById('err');
    el.style.display='block';
    el.innerHTML='資料抓取失敗：' + err.message;

  }

  document.getElementById('loading').style.display='none';
}

function render(rows){

  const cards = document.getElementById('cards');

  cards.innerHTML = rows.map(r => {

    if(r.error){

      return `
      <div class="card">
        <div class="card-name">${r.name}</div>
        <div style="margin-top:16px;color:#f87171">
          API 讀取失敗
        </div>
      </div>`;
    }

    const isUp = r.change > 0;
    const isDown = r.change < 0;

    const cls = isUp ? 'up' : isDown ? 'down' : 'flat';

    const peg =
      (r.pe && r.epsGrowth)
      ? r.pe / r.epsGrowth
      : null;

    const upside =
      (r.analyst && r.price)
      ? ((r.analyst - r.price) / r.price * 100)
      : null;

    return `
    <div class="card">

      <div class="card-top">
        <div>
          <div style="font-size:.8rem;color:#94a3b8">
            ${r.code}
          </div>

          <div class="card-name">
            ${r.name}
          </div>
        </div>

        <div style="
          border:1px solid ${pegColor(peg)};
          color:${pegColor(peg)};
          padding:6px 10px;
          border-radius:8px;
          font-size:.8rem;
        ">
          PEG ${peg ? fmt(peg) : '—'}
        </div>
      </div>

      <div class="price">
        $${fmt(r.price)}
      </div>

      <div class="${cls}" style="font-size:1rem">
        ${r.change > 0 ? '▲' : r.change < 0 ? '▼' : ''}
        ${fmt(Math.abs(r.change))}
        (${fmt(Math.abs(r.changePct))}%)
      </div>

      <div class="metrics">

        <div class="metric">
          <div class="metric-label">開盤</div>
          <div class="metric-val">${fmt(r.open)}</div>
        </div>

        <div class="metric">
          <div class="metric-label">最高</div>
          <div class="metric-val">${fmt(r.high)}</div>
        </div>

        <div class="metric">
          <div class="metric-label">最低</div>
          <div class="metric-val">${fmt(r.low)}</div>
        </div>

        <div class="metric">
          <div class="metric-label">成交量</div>
          <div class="metric-val">
            ${r.volume ? Number(r.volume).toLocaleString() : '—'}
          </div>
        </div>

        <div class="metric">
          <div class="metric-label">本益比</div>
          <div class="metric-val">
            ${r.pe ? fmt(r.pe) + 'x' : '—'}
          </div>
        </div>

        <div class="metric">
          <div class="metric-label">EPS 年增率</div>
          <div class="metric-val">
            ${r.epsGrowth}%
          </div>
        </div>

        <div class="metric">
          <div class="metric-label">法人目標價</div>
          <div class="metric-val">
            ${r.analyst ? '$'+r.analyst : '—'}
          </div>
        </div>

        <div class="metric">
          <div class="metric-label">上行空間</div>
          <div class="metric-val ${upside>0?'up':'down'}">
            ${upside ? fmt(upside)+'%' : '—'}
          </div>
        </div>

      </div>

    </div>
    `;

  }).join('');
}

fetchAll();

setInterval(fetchAll, 60000);

</script>
</body>
</html>
