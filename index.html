<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>00981A 成分股價值監控 (穩定修復版)</title>
<style>
  :root {
    --bg-color: #0b0f1a;
    --card-bg: #161e2d;
    --card-border: #2d3748;
    --text-main: #f1f5f9;
    --text-dim: #94a3b8;
    --up-color: #ef4444; 
    --down-color: #22c55e;
    --accent: #60a5fa;
  }

  body { margin: 0; background: var(--bg-color); color: var(--text-main); font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; }
  header { padding: 20px 24px; background: #111827; border-bottom: 1px solid var(--card-border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
  h1 { margin: 0; font-size: 1.4rem; color: var(--accent); }
  .controls { display: flex; align-items: center; gap: 12px; }
  #time { color: var(--text-dim); font-size: 0.8rem; font-family: monospace; }
  .src-badge { font-size: 0.65rem; padding: 4px 10px; border-radius: 20px; background: #1e293b; color: #34d399; border: 1px solid #059669; }
  
  button { background: #2563eb; color: white; border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-weight: 600; transition: 0.2s; }
  button:hover { background: #1d4ed8; }
  button:disabled { background: #4b5563; opacity: 0.6; }

  .sort-bar { padding: 12px 24px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; background: #0f172a; border-bottom: 1px solid var(--card-border); }
  .sbtn { background: transparent; border: 1px solid var(--card-border); color: var(--text-dim); padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
  .sbtn.active { background: #3b82f6; border-color: #3b82f6; color: white; }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 24px; }
  .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 20px; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .code { color: var(--accent); font-weight: 800; font-size: 0.9rem; }
  .name { font-size: 1.2rem; font-weight: bold; }
  
  .price-section { margin: 15px 0; }
  .price { font-size: 2.2rem; font-weight: 800; margin-right: 8px; }
  .change { font-size: 1rem; font-weight: 600; }

  .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .data-box { background: #1e293b66; padding: 10px; border-radius: 8px; border: 1px solid #1e293b; }
  .label { font-size: 0.65rem; color: var(--text-dim); display: block; margin-bottom: 4px; }
  .value { font-size: 0.95rem; font-weight: 700; }

  .up { color: var(--up-color); }
  .down { color: var(--down-color); }
  #error-msg { background: #450a0a; color: #f87171; padding: 10px 24px; display: none; font-size: 0.85rem; }
  footer { text-align: center; padding: 30px; color: var(--text-dim); font-size: 0.75rem; border-top: 1px solid var(--card-border); }
</style>
</head>
<body>

<div id="error-msg">⚠️ 資料獲取失敗，請確認網路連線或嘗試重新整理。</div>

<header>
  <div>
    <h1>00981A 成分股價值監控</h1>
    <div style="font-size: 0.75rem; color: var(--text-dim);">自動同步證交所官方收盤數據</div>
  </div>
  <div class="controls">
    <span class="src-badge">TWSE API (已掛載代理)</span>
    <span id="time">讀取中...</span>
    <button id="refreshBtn" onclick="fetchTwseData()">刷新行情</button>
  </div>
</header>

<div class="sort-bar">
  <span style="font-size: 0.8rem; color: var(--text-dim);">排序：</span>
  <button class="sbtn active" data-sort="peg" onclick="setSort(this)">PEG (低→高)</button>
  <button class="sbtn" data-sort="upside" onclick="setSort(this)">目標價潛力</button>
  <button class="sbtn" data-sort="growth" onclick="setSort(this)">EPS 成長率</button>
</div>

<div id="cards" class="cards"></div>

<footer>
  數據源：證交所 STOCK_DAY_ALL · 每日 14:30 後更新 · 2026 EPS 由法人報告預估
</footer>

<script>
// 00981A 核心成分股與法估數據
const COMPONENTS = {
  '2330': { name: '台積電', eps2026: 65.5, growth: 25, target: 1200 },
  '2454': { name: '聯發科', eps2026: 82.0, growth: 18, target: 1550 },
  '2317': { name: '鴻海',   eps2026: 16.8, growth: 22, target: 250 },
  '2308': { name: '台達電', eps2026: 18.5, growth: 15, target: 450 },
  '3711': { name: '日月光', eps2026: 15.7, growth: 30, target: 210 },
  '2382': { name: '廣達',   eps2026: 19.5, growth: 28, target: 360 },
  '6669': { name: '緯穎',   eps2026: 145.0, growth: 35, target: 2800 },
  '3034': { name: '聯詠',   eps2026: 42.0, growth: 10, target: 650 },
  '2379': { name: '瑞昱',   eps2026: 35.0, growth: 12, target: 600 },
  '3037': { name: '欣興',   eps2026: 14.5, growth: 20, target: 220 }
};

let marketData = {};
let sortKey = 'peg';

async function fetchTwseData() {
  const btn = document.getElementById('refreshBtn');
  const err = document.getElementById('error-msg');
  btn.disabled = true;
  btn.textContent = '獲取中...';
  err.style.display = 'none';

  // 使用 CORS Proxy 解決跨網域問題
  const targetUrl = 'https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL';
  const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;

  try {
    const response = await fetch(proxyUrl);
    if (!response.ok) throw new Error('HTTP Error');
    const data = await response.json();
    
    // 清洗資料
    marketData = {};
    data.forEach(item => {
      if (COMPONENTS[item.Code]) {
        marketData[item.Code] = {
          price: parseFloat(item.ClosingPrice.replace(/,/g, '')),
          change: parseFloat(item.Change.replace(/,/g, '')),
          status: item.Change.includes('-') ? 'down' : 'up'
        };
      }
    });

    document.getElementById('time').textContent = '更新：' + new Date().toLocaleTimeString();
    render();
  } catch (e) {
    console.error(e);
    err.style.display = 'block';
    err.textContent = '⚠️ TWSE API 連線超時或被阻擋。嘗試切換備援代理...';
    // 這裡可以加入備援 API 邏輯
  } finally {
    btn.disabled = false;
    btn.textContent = '刷新行情';
  }
}

function setSort(btn) {
  sortKey = btn.dataset.sort;
  document.querySelectorAll('.sbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const container = document.getElementById('cards');
  const list = Object.keys(COMPONENTS).map(code => {
    const info = COMPONENTS[code];
    const live = marketData[code] || { price: 0, change: 0, status: 'flat' };
    const pe = live.price > 0 ? live.price / info.eps2026 : 0;
    const peg = pe > 0 ? pe / info.growth : 0;
    const upside = live.price > 0 ? ((info.target - live.price) / live.price) * 100 : 0;
    return { code, ...info, ...live, pe, peg, upside };
  });

  list.sort((a, b) => {
    if (sortKey === 'peg') return (a.peg || 999) - (b.peg || 999);
    if (sortKey === 'upside') return b.upside - a.upside;
    if (sortKey === 'growth') return b.growth - a.growth;
    return 0;
  });

  container.innerHTML = list.map(s => `
    <div class="card">
      <div class="card-header">
        <div>
          <span class="code">${s.code}</span>
          <div class="name">${s.name}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:0.6rem; color:var(--text-dim)">PEG</div>
          <div style="font-weight:800; color:${s.peg < 1 ? '#34d399' : '#f87171'}">${s.peg ? s.peg.toFixed(2) : '--'}</div>
        </div>
      </div>

      <div class="price-section">
        <span class="price ${s.status}">${s.price || '--'}</span>
        <span class="change ${s.status}">${s.change > 0 ? '▲' : '▼'}${Math.abs(s.change) || ''}</span>
      </div>

      <div class="data-grid">
        <div class="data-box"><span class="label">預估 PE</span><span class="value">${s.pe ? s.pe.toFixed(1) : '--'}x</span></div>
        <div class="data-box"><span class="label">目標空間</span><span class="value" style="color:#34d399">${s.upside ? '+' + s.upside.toFixed(0) : '--'}%</span></div>
        <div class="data-box"><span class="label">2026 EPS</span><span class="value">$${s.eps2026}</span></div>
        <div class="data-box"><span class="label">預期成長</span><span class="value">${s.growth}%</span></div>
      </div>
    </div>
  `).join('');
}

fetchTwseData();
</script>
</body>
</html>
