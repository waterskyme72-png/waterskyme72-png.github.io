<!DOCTYPE html>
<html lang="zh-TW">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>台股前200強價值監控系統</title>

<style>

:root{
  --bg:#0d1117;
  --card:#161b22;
  --border:#30363d;
  --text:#c9d1d9;
  --dim:#8b949e;
  --up:#f85149;
  --down:#3fb950;
  --accent:#58a6ff;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

header{
  padding:16px 24px;
  background:#010409;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:100;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:16px;
}

.logo h1{
  margin:0;
  color:var(--accent);
  font-size:1.2rem;
}

.logo small{
  color:var(--dim);
}

.search-box{
  width:260px;
  background:#0d1117;
  border:1px solid var(--border);
  border-radius:6px;
  padding:8px 12px;
  color:white;
  outline:none;
}

.controls{
  display:flex;
  align-items:center;
  gap:12px;
}

button{
  background:#238636;
  border:none;
  color:white;
  padding:8px 16px;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  opacity:.9;
}

.sort-bar{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:12px 24px;
  border-bottom:1px solid var(--border);
}

.sbtn{
  background:#21262d;
  border:1px solid var(--border);
}

.sbtn.active{
  background:#388bfd;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:16px;
  padding:20px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:18px;
  transition:.2s;
}

.card:hover{
  transform:translateY(-2px);
  border-color:#8b949e;
}

.card-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  margin-bottom:12px;
}

.title-group{
  flex:1;
}

.code{
  font-size:.8rem;
  color:var(--dim);
  font-family:monospace;
}

.name{
  font-size:1.15rem;
  font-weight:800;
  color:white;
  margin-top:2px;
}

.price-row{
  display:flex;
  align-items:baseline;
  gap:10px;
  margin-bottom:14px;
}

.price{
  font-size:2rem;
  font-weight:800;
}

.change{
  font-size:1rem;
  font-weight:600;
}

.up{
  color:var(--up);
}

.down{
  color:var(--down);
}

.peg-label{
  padding:4px 10px;
  border-radius:6px;
  font-size:.7rem;
  font-weight:bold;
  white-space:nowrap;
  text-align:center;
}

.value-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:12px;
}

.v-box{
  background:#0d1117;
  padding:10px;
  border-radius:6px;
}

.v-lbl{
  display:block;
  font-size:.65rem;
  color:var(--dim);
  margin-bottom:4px;
}

.v-val{
  font-size:.95rem;
  font-weight:700;
}

.grow{
  color:#fbbf24;
}

#loading{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
  font-size:1.2rem;
}

</style>
</head>

<body>

<div id="loading">
  📡 數據同步中...
</div>

<header>

  <div class="logo">
    <h1>台股前200強價值監控</h1>
    <small>FinMind 穩定版</small>
  </div>

  <input
    type="text"
    id="searchInput"
    class="search-box"
    placeholder="搜尋股票..."
    oninput="render()"
  >

  <div class="controls">

    <span id="updateTime">
      尚未同步
    </span>

    <button onclick="fetchAllData()">
      刷新
    </button>

  </div>

</header>

<div class="sort-bar">

  <button
    class="sbtn active"
    onclick="setSort('marketValue', this)"
  >
    成交金額排序
  </button>

  <button
    class="sbtn"
    onclick="setSort('price', this)"
  >
    股價排序
  </button>

  <button
    class="sbtn"
    onclick="setSort('peg', this)"
  >
    PEG排序
  </button>

  <button
    class="sbtn"
    onclick="setSort('change', this)"
  >
    漲跌排序
  </button>

</div>

<div id="mainGrid" class="grid"></div>

<script>

// ===== 前200熱門股票池 =====

const STOCK_POOL = [

"2330","2454","2317","2308","2382",
"3711","3017","6669","2603","2609",
"2615","1301","1303","2002","2881",
"2882","2884","2885","2886","2887",
"2888","2890","2891","2892","1101",
"1102","1216","1308","1326","1402",
"1476","1504","1513","1519","1536",
"1560","1590","1605","1707","1717",
"1722","1785","1802","1907","2006",
"2027","2049","2105","2207","2301",
"2303","2324","2327","2337","2344",
"2345","2352","2353","2354","2356",
"2360","2368","2376","2377","2395",
"2408","2409","2412","2449","2451",
"2464","2474","2478","2481","2492",
"2498","2504","2520","2606","2610",
"2618","2634","2801","2834","2880",
"2883","2889","2897","2912","3008",
"3034","3035","3037","3045","3231",
"3443","3481","3653","3661","3702",
"4904","4938","5871","5880","5886",
"6415","6446","6488","6505","6515",
"6585","6669","8046","8069","8454"

];

// ===== 成長率估值 =====

function estimateGrowth(per){

  if(!per) return null;

  return Math.max(
    5,
    Math.min(
      40,
      30 - per
    )
  );
}

let currentMarket = [];

let sortKey = "marketValue";

// ===== 排序 =====

function setSort(key, btn){

  sortKey = key;

  document
    .querySelectorAll(".sbtn")
    .forEach(b =>
      b.classList.remove("active")
    );

  btn.classList.add("active");

  render();
}

// ===== 抓單一股票 =====

async function fetchStock(code){

  try{

    const year =
      new Date().getFullYear();

    const startDate =
      `${year}-01-01`;

    // ===== 股價 =====

    const priceUrl =
      `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${code}&start_date=${startDate}`;

    // ===== PER =====

    const perUrl =
      `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPER&data_id=${code}&start_date=${startDate}`;

    const [priceRes, perRes] =
      await Promise.all([
        fetch(priceUrl),
        fetch(perUrl)
      ]);

    const priceJson =
      await priceRes.json();

    const perJson =
      await perRes.json();

    if(
      !priceJson.data ||
      !priceJson.data.length
    ){
      return null;
    }

    const latest =
      priceJson.data[
        priceJson.data.length - 1
      ];

    const latestPer =
      perJson.data?.length
        ? perJson.data[
            perJson.data.length - 1
          ]
        : null;

    const price =
      Number(latest.close);

    const open =
      Number(latest.open);

    const change =
      price - open;

    const volume =
      Number(latest.Trading_Volume || 0);

    const marketValue =
      price * volume;

    const pct =
      open
        ? (
            change / open * 100
          ).toFixed(2)
        : "0.00";

    const per =
      latestPer?.PER || null;

    const eps =
      per
        ? (price / per).toFixed(2)
        : null;

    const growth =
      estimateGrowth(per);

    const peg =
      per && growth
        ? per / growth
        : null;

    return {

      code,

      name:
        latest.stock_name ||
        code,

      price,

      change,

      pct,

      volume,

      marketValue,

      per,

      eps,

      growth,

      peg
    };

  }catch(err){

    console.error(
      code,
      err
    );

    return null;
  }
}

// ===== 全部抓取 =====

async function fetchAllData(){

  const loading =
    document.getElementById("loading");

  loading.style.display = "flex";

  try{

    const results =
      await Promise.all(
        STOCK_POOL.map(fetchStock)
      );

    currentMarket =
      results
        .filter(Boolean)
        .sort(
          (a,b)=>
            b.marketValue - a.marketValue
        )
        .slice(0, 200);

    document
      .getElementById("updateTime")
      .textContent =
      "更新：" +
      new Date()
        .toLocaleTimeString();

    render();

  }catch(err){

    console.error(err);

    alert("資料讀取失敗");

  }finally{

    loading.style.display = "none";
  }
}

// ===== render =====

function render(){

  const grid =
    document.getElementById("mainGrid");

  const query =
    document
      .getElementById("searchInput")
      .value
      .toLowerCase();

  let filtered =
    currentMarket.filter(s => {

      return (

        s.code.includes(query)

        ||

        (s.name || "")
          .toLowerCase()
          .includes(query)

      );
    });

  filtered.sort((a,b)=>{

    if(sortKey === "marketValue"){
      return b.marketValue - a.marketValue;
    }

    if(sortKey === "price"){
      return b.price - a.price;
    }

    if(sortKey === "change"){
      return b.change - a.change;
    }

    if(sortKey === "peg"){

      const A =
        a.peg ?? 999;

      const B =
        b.peg ?? 999;

      return A - B;
    }

    return 0;
  });

  grid.innerHTML =
    filtered.map(s => {

      const isUp =
        s.change > 0;

      const colorClass =
        isUp
          ? "up"
          : s.change < 0
            ? "down"
            : "";

      let pegColor =
        "#999";

      let pegText =
        "無資料";

      if(s.peg){

        if(s.peg < 1){

          pegColor =
            "#34d399";

          pegText =
            "低估";
        }
        else if(s.peg > 1.5){

          pegColor =
            "#f87171";

          pegText =
            "偏貴";
        }
        else{

          pegColor =
            "#fbbf24";

          pegText =
            "合理";
        }
      }

      return `

      <div class="card">

        <div class="card-header">

          <div class="title-group">

            <div class="code">
              ${s.code}
            </div>

            <div class="name">
              ${s.name}
            </div>

          </div>

          ${
            s.peg
            ?
            `
            <div
              class="peg-label"
              style="
                background:${pegColor}22;
                color:${pegColor};
                border:1px solid ${pegColor}55;
              "
            >
              PEG ${s.peg.toFixed(2)}

              <br>

              <span style="font-size:.6rem">
                ${pegText}
              </span>

            </div>
            `
            :
            ""
          }

        </div>

        <div class="price-row">

          <div class="price ${colorClass}">
            ${s.price}
          </div>

          <div class="change ${colorClass}">

            ${
              isUp
                ? "▲"
                : s.change < 0
                  ? "▼"
                  : ""
            }

            ${Math.abs(s.change).toFixed(2)}

            (${s.pct}%)

          </div>

        </div>

        <div class="value-grid">

          <div class="v-box">

            <span class="v-lbl">
              預估 EPS
            </span>

            <span class="v-val">
              ${s.eps || "--"}
            </span>

          </div>

          <div class="v-box">

            <span class="v-lbl">
              PER
            </span>

            <span class="v-val">

              ${
                s.per
                  ? s.per.toFixed(2)
                  : "--"
              }

            </span>

          </div>

          <div class="v-box">

            <span class="v-lbl">
              PEG
            </span>

            <span class="v-val">

              ${
                s.peg
                  ? s.peg.toFixed(2)
                  : "--"
              }

            </span>

          </div>

          <div class="v-box">

            <span class="v-lbl">
              成交金額
            </span>

            <span class="v-val grow">

              ${
                (
                  s.marketValue /
                  100000000
                ).toFixed(0)
              }

              億

            </span>

          </div>

        </div>

      </div>

      `;
    }).join("");

}

// ===== 啟動 =====

fetchAllData();

// ===== 每5分鐘刷新 =====

setInterval(
  fetchAllData,
  300000
);

</script>

</body>
</html>
