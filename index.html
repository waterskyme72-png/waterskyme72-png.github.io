<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>封測產業即時監控</title>
<style>
  :root {
    --bg-color: #080c14;
    --card-bg: #111827;
    --card-border: #1f2937;
    --text-main: #f9fafb;
    --text-dim: #9ca3af;
    --up-color: #f87171;
    --down-color: #34d399;
    --accent: #38bdf8;
    --value-color: #6ee7b7;
  }

  body { margin: 0; background: var(--bg-color); color: var(--text-main); font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; }

  header { padding: 16px 24px; background: #0f172a; border-bottom: 1px solid var(--card-border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 10px; }
  h1 { margin: 0; font-size: 1.3rem; letter-spacing: 1px; }
  .subtitle { font-size: 0.72rem; color: var(--text-dim); margin-top: 3px; }
  .controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  #time { color: var(--text-dim); font-size: 0.78rem; font-family: monospace; }
  .src-badge { font-size: 0.62rem; padding: 3px 8px; border-radius: 4px; background: #1e293b; color: var(--accent); border: 1px solid #334155; }
  button { background: transparent; color: var(--accent); border: 1px solid var(--accent); border-radius: 6px; padding: 6px 14px; cursor: pointer; font-weight: bold; font-family: inherit; transition: 0.2s; }
  button:hover { background: rgba(56,189,248,0.1); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .sort-bar { padding: 11px 24px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; border-bottom: 1px solid #0f172a; }
  .sort-label { font-size: 0.7rem; color: var(--text-dim); }
  .sbtn { background: transparent; border: 1px solid var(--card-border); color: var(--text-dim); padding: 4px 11px; border-radius: 4px; cursor: pointer; font-size: 0.68rem; font-family: inherit; transition: all .15s; }
  .sbtn.active { background: #1e293b; border-color: var(--accent); color: var(--accent); }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 18px; padding: 20px 24px; }
  @media(max-width:480px){ .cards{padding:12px; grid-template-columns:1fr} }

  .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 18px; padding: 22px; position: relative; overflow: hidden; transition: border-color 0.2s; }
  .card:hover { border-color: #374151; }
  .card-glow { position: absolute; inset: 0; border-radius: 18px; pointer-events: none; }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  .code { color: var(--text-dim); font-size: 0.77rem; font-weight: bold; }
  .name { font-size: 1.22rem; font-weight: 800; }
  .mkt { font-size: 0.58rem; padding: 2px 6px; border-radius: 3px; font-weight: 700; margin-left: 6px; }
  .mkt-tse { background:#1e40af33; color:#93c5fd; }
  .mkt-otc { background:#7e22ce33; color:#c4b5fd; }
  .peg-chip { font-size: 0.62rem; padding: 4px 10px; border-radius: 6px; border: 1px solid; font-weight: 700; text-align: right; line-height: 1.6; white-space: nowrap; }

  .price-row { margin-top: 14px; display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .price { font-size: 2.5rem; font-weight: 900; line-height: 1; }
  .change-tag { font-weight: 700; font-size: 0.95rem; }

  .ohlv { display: flex; margin: 10px 0; border-top: 1px solid var(--card-border); border-bottom: 1px solid var(--card-border); padding: 7px 0; }
  .ohlv-item { flex: 1; text-align: center; }
  .ohlv-lbl { font-size: 0.56rem; color: #475569; display: block; margin-bottom: 2px; }
  .ohlv-val { font-size: 0.76rem; color: var(--text-dim); font-weight: 600; }

  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-top: 4px; }
  .box { background: #1e293b; border-radius: 10px; padding: 10px 12px; }
  .box-lbl { color: var(--text-dim); font-size: 0.62rem; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; display: block; }
  .box-val { font-weight: 700; font-size: 1rem; }
  .highlight { color: var(--value-color); }
  .up   { color: var(--up-color); }
  .down { color: var(--down-color); }
  .flat { color: var(--text-dim); }

  .peg-bar-wrap { margin-top: 14px; }
  .peg-bar-bg { height: 5px; background: #1e293b; border-radius: 3px; position: relative; overflow: hidden; margin-bottom: 4px; }
  .peg-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
  .peg-bar-mark { position: absolute; left: 25%; top: 0; bottom: 0; width: 2px; background: #475569; opacity: 0.7; }
  .peg-bar-ends { display: flex; justify-content: space-between; font-size: 0.58rem; }

  #error { margin: 12px 24px; background: #7f1d1d; color: #fecaca; padding: 12px 16px; border-radius: 10px; display: none; font-size: 0.8rem; }
  #loading { text-align: center; padding: 50px; color: var(--text-dim); font-size: 0.95rem; }

  footer { padding: 22px 24px; color: var(--text-dim); font-size: 0.7rem; text-align: center; border-top: 1px solid var(--card-border); line-height: 2; }
</style>
</head>
<body>

<header>
  <div>
    <h1>封測產業即時監控</h1>
    <div class="subtitle">日月光 · 力成 · 京元電子 · 南茂 · 矽格 · 欣銓</div>
  </div>
  <div class="controls">
    <span class="src-badge" id="srcBadge">Yahoo Finance</span>
    <span id="time">等待資料...</span>
    <button id="refreshBtn" onclick="fetchData()">↻ 刷新</button>
  </div>
</header>

<div class="sort-bar">
  <span class="sort-label">排序：</span>
  <button class="sbtn active" data-sort="peg"    onclick="setSort(this)">PEG 低→高</button>
  <button class="sbtn"        data-sort="eps"    onclick="setSort(this)">EPS成長 高→低</button>
  <button class="sbtn"        data-sort="pe"     onclick="setSort(this)">本益比 低→高</button>
  <button class="sbtn"        data-sort="upside" onclick="setSort(this)">上行空間 高→低</button>
</div>

<div id="error"></div>
<div id="loading">🔄 連線至 Yahoo Finance...</div>
<div id="cards" class="cards"></div>

<footer>
  股價來源：Yahoo Finance（盤中 15 分鐘延遲）· Forward PE = 股價 ÷ 2026 預估 EPS · EPS 年增率為法人預估 · 每 60 秒自動更新<br>
  ⚠️ 僅供參考，不構成投資建議
</footer>

<script>
const STOCKS = {
  '3711.TW':  { name:'日月光投控', code:'3711', epsGrowth:89, eps2026:15.71, analyst:472,  market:'TSE' },
  '6239.TW':  { name:'力成',       code:'6239', epsGrowth:47, eps2026:10.76, analyst:265,  market:'TSE' },
  '2449.TW':  { name:'京元電子',   code:'2449', epsGrowth:10, eps2026: 9.77, analyst:350,  market:'TSE' },
  '8150.TW':  { name:'南茂',       code:'8150', epsGrowth: 3, eps2026: 2.84, analyst: 55,  market:'TSE' },
  '6257.TWO': { name:'矽格',       code:'6257', epsGrowth:39, eps2026: 7.80, analyst:125,  market:'OTC' },
  '3264.TWO': { name:'欣銓',       code:'3264', epsGrowth:20, eps2026: 8.00, analyst:null, market:'OTC' },
};
const SYMBOLS = Object.keys(STOCKS);
let liveData = {}, sortKey = 'peg';

const fmt  = (v,d=2) => v!=null&&!isNaN(v) ? Number(v).toFixed(d) : '—';
const fmtK = v => v ? Math.round(v/1000).toLocaleString()+'K' : '—';

function pegColor(p){ if(!p||p<=0)return'#9ca3af'; if(p<0.6)return'#34d399'; if(p<1.0)return'#86efac'; if(p<2.0)return'#fbbf24'; return'#f87171'; }
function pegLabel(p){ if(!p||p<=0)return'—'; if(p<0.6)return'嚴重低估 🟢'; if(p<1.0)return'偏低估 🟡'; if(p<2.0)return'合理'; return'偏高估 🔴'; }

// ── Yahoo Finance（三重備援）──
async function fetchYahoo() {
  const syms   = SYMBOLS.join(',');
  const fields = 'regularMarketPrice,regularMarketOpen,regularMarketDayHigh,regularMarketDayLow,regularMarketChange,regularMarketChangePercent,regularMarketVolume,regularMarketTime';
  const base   = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${syms}&fields=${fields}`;
  const base2  = `https://query2.finance.yahoo.com/v7/finance/quote?symbols=${syms}&fields=${fields}`;

  const attempts = [
    { label:'Yahoo Finance (q1)', url: base  },
    { label:'Yahoo Finance (q2)', url: base2 },
    { label:'Yahoo + Proxy',      url: `https://corsproxy.io/?${encodeURIComponent(base)}` },
  ];

  for (const a of attempts) {
    try {
      const res = await fetch(a.url, { signal: AbortSignal.timeout(9000) });
      if (!res.ok) throw new Error('HTTP '+res.status);
      const json = await res.json();
      const results = json?.quoteResponse?.result || [];
      if (!results.length) throw new Error('empty');

      const map = {};
      results.forEach(q => {
        map[q.symbol] = {
          close:     q.regularMarketPrice,
          open:      q.regularMarketOpen,
          high:      q.regularMarketDayHigh,
          low:       q.regularMarketDayLow,
          change:    q.regularMarketChange,
          changePct: q.regularMarketChangePercent,
          vol:       q.regularMarketVolume,
          ts:        q.regularMarketTime,
        };
      });
      return { ok:true, data:map, source:a.label };
    } catch(e) { console.warn(a.label, e.message); }
  }
  return { ok:false };
}

async function fetchData() {
  const btn   = document.getElementById('refreshBtn');
  const errEl = document.getElementById('error');
  const ldEl  = document.getElementById('loading');
  btn.disabled = true; btn.textContent = '更新中...';
  errEl.style.display = 'none';
  ldEl.style.display  = 'block';

  const res = await fetchYahoo();
  if (res.ok) {
    liveData = res.data;
    const firstKey = Object.keys(liveData)[0];
    const ts = liveData[firstKey]?.ts;
    const t  = ts
      ? new Date(ts*1000).toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false})
      : new Date().toLocaleTimeString('zh-TW',{hour12:false});
    document.getElementById('time').textContent = '報價時間 '+t;
    const badge = document.getElementById('srcBadge');
    badge.textContent = res.source + ' ✓';
    badge.style.color = '#34d399';
    badge.style.borderColor = '#166534';
  } else {
    errEl.style.display = 'block';
    errEl.textContent = '⚠️ Yahoo Finance 連線失敗，請稍後重試。（顯示研究數據）';
    document.getElementById('time').textContent = '離線模式';
    liveData = {};
  }

  ldEl.style.display = 'none';
  btn.disabled = false; btn.textContent = '↻ 刷新';
  render();
}

function setSort(btn) {
  sortKey = btn.dataset.sort;
  document.querySelectorAll('.sbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const rows = SYMBOLS.map(sym => {
    const conf   = STOCKS[sym];
    const live   = liveData[sym] || {};
    const price  = live.close ?? null;
    const pe     = price ? price / conf.eps2026 : null;
    const peg    = pe    ? pe   / conf.epsGrowth : null;
    const upside = price && conf.analyst ? (conf.analyst - price) / price * 100 : null;
    return { sym, conf, live, price, pe, peg, upside };
  });

  rows.sort((a,b) => {
    switch(sortKey) {
      case 'peg':    return (a.peg??9999)-(b.peg??9999);
      case 'eps':    return b.conf.epsGrowth-a.conf.epsGrowth;
      case 'pe':     return (a.pe??9999)-(b.pe??9999);
      case 'upside': return (b.upside??-9999)-(a.upside??-9999);
    }
    return 0;
  });

  document.getElementById('cards').innerHTML = rows.map(({sym,conf,live,price,pe,peg,upside}) => {
    const pc   = pegColor(peg);
    const isUp = live.change > 0, isDn = live.change < 0;
    const cc   = isUp ? 'up' : isDn ? 'down' : 'flat';
    const ar   = isUp ? '▲' : isDn ? '▼' : '';
    const uc   = upside>0?'#34d399':upside<0?'#f87171':'#9ca3af';
    const barW = peg ? Math.min(peg/4*100,100) : 0;

    return `<div class="card">
      <div class="card-glow" style="background:${pc}14"></div>
      <div class="card-top">
        <div>
          <div style="display:flex;align-items:center">
            <span class="code">${conf.code}</span>
            <span class="mkt mkt-${conf.market.toLowerCase()}">${conf.market}</span>
          </div>
          <div class="name">${conf.name}</div>
        </div>
        <div class="peg-chip" style="color:${pc};border-color:${pc}55;background:${pc}14">
          ${peg?'PEG '+fmt(peg):'PEG —'}<br>
          <span style="font-size:.56rem;font-weight:500">${pegLabel(peg)}</span>
        </div>
      </div>

      <div class="price-row">
        <div class="price ${cc}">${price!=null?'$'+fmt(price):'—'}</div>
        ${live.change!=null?`<div class="change-tag ${cc}">${ar}${fmt(Math.abs(live.change))} (${fmt(Math.abs(live.changePct))}%)</div>`:''}
      </div>

      ${price?`<div class="ohlv">
        ${[['開',live.open],['高',live.high],['低',live.low]].map(([l,v])=>`
          <div class="ohlv-item"><span class="ohlv-lbl">${l}</span><span class="ohlv-val">${fmt(v)}</span></div>`).join('')}
        <div class="ohlv-item"><span class="ohlv-lbl">量(K)</span><span class="ohlv-val">${fmtK(live.vol)}</span></div>
      </div>`:`<div style="height:10px"></div>`}

      <div class="info-grid">
        <div class="box"><span class="box-lbl">Forward PE (2026)</span><div class="box-val">${pe!=null?fmt(pe,1)+'x':'—'}</div></div>
        <div class="box"><span class="box-lbl">EPS 年增率（法預）</span><div class="box-val" style="color:#fbbf24">${conf.epsGrowth}%</div></div>
        <div class="box"><span class="box-lbl">2026 預估 EPS</span><div class="box-val">$${fmt(conf.eps2026)}</div></div>
        <div class="box"><span class="box-lbl">法人目標價</span><div class="box-val">${conf.analyst?'$'+conf.analyst:'—'}</div></div>
        <div class="box" style="grid-column:1/-1">
          <span class="box-lbl">目標上行空間</span>
          <div class="box-val" style="color:${uc};font-size:1.1rem">${upside!=null?(upside>0?'+':'')+fmt(upside)+'%':'—'}</div>
        </div>
      </div>

      <div class="peg-bar-wrap">
        <div class="peg-bar-bg">
          <div class="peg-bar-fill" style="width:${barW}%;background:linear-gradient(90deg,${pc}55,${pc})"></div>
          <div class="peg-bar-mark"></div>
        </div>
        <div class="peg-bar-ends">
          <span style="color:#34d399">◀ 低估</span>
          <span style="color:#475569">PEG = 1</span>
          <span style="color:#f87171">高估 ▶</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

render();
fetchData();
setInterval(fetchData, 60000);
</script>
</body>
</html>
