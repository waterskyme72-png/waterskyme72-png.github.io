<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>台股前200強價值監控系統</title>

<style>
:root{
  --bg:#0d1117;
  --card:#161b22;
  --border:#30363d;
  --text:#c9d1d9;
  --dim:#8b949e;
  --up:#f85149;
  --down:#3fb950;
  --accent:#58a6ff;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

header{
  padding:16px 24px;
  background:#010409;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:100;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:16px;
}

.logo h1{
  margin:0;
  font-size:1.2rem;
  color:var(--accent);
}

.logo small{
  color:var(--dim);
}

.search-box{
  width:260px;
  background:#0d1117;
  border:1px solid var(--border);
  border-radius:6px;
  padding:8px 12px;
  color:white;
  outline:none;
}

.controls{
  display:flex;
  align-items:center;
  gap:12px;
}

button{
  background:#238636;
  color:white;
  border:none;
  border-radius:6px;
  padding:8px 16px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  opacity:.9;
}

.sort-bar{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:12px 24px;
  border-bottom:1px solid var(--border);
}

.sbtn{
  background:#21262d;
  border:1px solid var(--border);
}

.sbtn.active{
  background:#388bfd;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:16px;
  padding:20px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:18px;
  transition:.2s;
}

.card:hover{
  transform:translateY(-2px);
  border-color:#8b949e;
}

.card-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  margin-bottom:12px;
}

.title-group{
  flex:1;
}

.code{
  font-size:.8rem;
  color:var(--dim);
  font-family:monospace;
}

.name{
  font-size:1.15rem;
  font-weight:800;
  color:white;
  margin-top:2px;
}

.peg-label{
  padding:4px 10px;
  border-radius:6px;
  font-size:.7rem;
  font-weight:bold;
  white-space:nowrap;
  text-align:center;
}

.price-row{
  display:flex;
  align-items:baseline;
  gap:10px;
  margin-bottom:14px;
}

.price{
  font-size:2rem;
  font-weight:800;
}

.change{
  font-size:1rem;
  font-weight:600;
}

.up{
  color:var(--up);
}

.down{
  color:var(--down);
}

.value-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:12px;
}

.v-box{
  background:#0d1117;
  border-radius:6px;
  padding:10px;
}

.v-lbl{
  display:block;
  font-size:.65rem;
  color:var(--dim);
  margin-bottom:4px;
}

.v-val{
  font-size:.95rem;
  font-weight:700;
}

.grow{
  color:#fbbf24;
}

#loading{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
  font-size:1.2rem;
}
</style>
</head>

<body>

<div id="loading">
  📡 數據同步中...
</div>

<header>

  <div class="logo">
    <h1>台股前200強價值監控系統</h1>
    <small>TWSE + FinMind 全自動版</small>
  </div>

  <input
    type="text"
    id="searchInput"
    class="search-box"
    placeholder="搜尋股票代號或名稱..."
    oninput="render()"
  >

  <div class="controls">
    <span id="updateTime">尚未同步</span>

    <button onclick="fetchAllData()">
      刷新
    </button>
  </div>

</header>

<div class="sort-bar">

  <button
    class="sbtn active"
    onclick="setSort('marketValue', this)"
  >
    市值排序
  </button>

  <button
    class="sbtn"
    onclick="setSort('price', this)"
  >
    股價排序
  </button>

  <button
    class="sbtn"
    onclick="setSort('peg', this)"
  >
    PEG 排序
  </button>

  <button
    class="sbtn"
    onclick="setSort('change', this)"
  >
    漲跌排序
  </button>

</div>

<div id="mainGrid" class="grid"></div>

<script>

let currentMarket = [];
let sortKey = 'marketValue';

function setSort(key, btn){

  sortKey = key;

  document
    .querySelectorAll('.sbtn')
    .forEach(b => b.classList.remove('active'));

  btn.classList.add('active');

  render();
}

async function fetchAllData(){

  const loading =
    document.getElementById('loading');

  loading.style.display = 'flex';

  try{

    // TWSE 全市場資料
    const twseUrl =
      'https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL';

    const res = await fetch(twseUrl);

    const data = await res.json();

    // 依成交金額排序，取前200強
    const top200 = data
      .map(s => {

        const price = parseFloat(
          s.ClosingPrice.replace(/,/g, '')
        );

        const volume = parseFloat(
          s.TradeVolume.replace(/,/g, '')
        );

        const value = price * volume;

        const change = parseFloat(
          (s.Change || '0').replace(/,/g, '')
        );

        return {
          code: s.Code,
          name: s.Name,
          price,
          change,
          volume,
          marketValue: value
        };
      })
      .filter(s => !isNaN(s.price))
      .sort((a,b)=> b.marketValue - a.marketValue)
      .slice(0, 200);

    // 加入 FinMind PER
    const enhanced = await Promise.all(
      top200.map(fetchPERData)
    );

    currentMarket = enhanced;

    document
      .getElementById('updateTime')
      .textContent =
      '更新：' +
      new Date().toLocaleTimeString();

    render();

  }catch(err){

    console.error(err);

    alert('資料讀取失敗');

  }finally{

    loading.style.display = 'none';
  }
}

async function fetchPERData(stock){

  try{

    const year =
      new Date().getFullYear();

    const url =
      `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPER&data_id=${stock.code}&start_date=${year}-01-01`;

    const res = await fetch(url);

    const json = await res.json();

    const latest =
      json.data?.length
        ? json.data[json.data.length - 1]
        : null;

    const per = latest?.PER || null;

    const eps =
      per
        ? (stock.price / per).toFixed(2)
        : null;

    // 簡易成長率估算
    let growth = null;

    if(per){
      growth =
        Math.max(
          5,
          Math.min(
            40,
            (30 - per)
          )
        );
    }

    const peg =
      per && growth
        ? per / growth
        : null;

    return {
      ...stock,
      per,
      eps,
      growth,
      peg
    };

  }catch(err){

    return {
      ...stock,
      per:null,
      eps:null,
      growth:null,
      peg:null
    };
  }
}

function render(){

  const grid =
    document.getElementById('mainGrid');

  const query =
    document
      .getElementById('searchInput')
      .value
      .toLowerCase();

  let filtered =
    currentMarket.filter(s => {

      return (
        s.code.includes(query) ||
        s.name.toLowerCase().includes(query)
      );
    });

  filtered.sort((a,b)=>{

    if(sortKey === 'marketValue'){
      return b.marketValue - a.marketValue;
    }

    if(sortKey === 'price'){
      return b.price - a.price;
    }

    if(sortKey === 'change'){
      return b.change - a.change;
    }

    if(sortKey === 'peg'){

      const A = a.peg ?? 999;
      const B = b.peg ?? 999;

      return A - B;
    }

    return 0;
  });

  grid.innerHTML =
    filtered.map(s => {

      const isUp = s.change > 0;

      const colorClass =
        isUp
          ? 'up'
          : s.change < 0
            ? 'down'
            : '';

      let pegColor = '#999';
      let pegText = '無資料';

      if(s.peg){

        if(s.peg < 1){
          pegColor = '#34d399';
          pegText = '低估';
        }
        else if(s.peg > 1.5){
          pegColor = '#f87171';
          pegText = '偏貴';
        }
        else{
          pegColor = '#fbbf24';
          pegText = '合理';
        }
      }

      return `

      <div class="card">

        <div class="card-header">

          <div class="title-group">

            <div class="code">
              ${s.code}
            </div>

            <div class="name">
              ${s.name}
            </div>

          </div>

          ${
            s.peg
            ?
            `
            <div
              class="peg-label"
              style="
                background:${pegColor}22;
                color:${pegColor};
                border:1px solid ${pegColor}55;
              "
            >
              PEG ${s.peg.toFixed(2)}
              <br>

              <span style="font-size:.6rem">
                ${pegText}
              </span>

            </div>
            `
            : ''
          }

        </div>

        <div class="price-row">

          <div class="price ${colorClass}">
            ${s.price}
          </div>

          <div class="change ${colorClass}">

            ${
              isUp
                ? '▲'
                : s.change < 0
                  ? '▼'
                  : ''
            }

            ${Math.abs(s.change).toFixed(2)}

          </div>

        </div>

        <div class="value-grid">

          <div class="v-box">

            <span class="v-lbl">
              預估 EPS
            </span>

            <span class="v-val">
              ${s.eps || '--'}
            </span>

          </div>

          <div class="v-box">

            <span class="v-lbl">
              PER
            </span>

            <span class="v-val">
              ${s.per ? s.per.toFixed(2) : '--'}
            </span>

          </div>

          <div class="v-box">

            <span class="v-lbl">
              PEG
            </span>

            <span class="v-val">
              ${s.peg ? s.peg.toFixed(2) : '--'}
            </span>

          </div>

          <div class="v-box">

            <span class="v-lbl">
              市值強度
            </span>

            <span class="v-val grow">
              ${(s.marketValue / 100000000).toFixed(0)} 億
            </span>

          </div>

        </div>

      </div>

      `;

    }).join('');
}

fetchAllData();

setInterval(fetchAllData, 300000);

</script>

</body>
</html>
