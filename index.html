<script>

const STOCK_INFO = {

  "2330": {
    name: "台積電",
    growth: 22
  },

  "2454": {
    name: "聯發科",
    growth: 18
  },

  "2317": {
    name: "鴻海",
    growth: 22
  },

  "2382": {
    name: "廣達",
    growth: 28
  },

  "6669": {
    name: "緯穎",
    growth: 35
  },

  "3017": {
    name: "奇鋐",
    growth: 32
  },

  "2308": {
    name: "台達電",
    growth: 15
  },

  "1519": {
    name: "華城",
    growth: 30
  },

  "1513": {
    name: "中興電",
    growth: 12
  },

  "1503": {
    name: "士電",
    growth: 8
  },

  "1514": {
    name: "亞力",
    growth: 21
  },

  "2603": {
    name: "長榮",
    growth: 5
  },

  "2881": {
    name: "富邦金",
    growth: 8
  }

};

const STOCK_POOL =
  Object.keys(STOCK_INFO);

let currentMarket = [];

let sortKey = "price";

function setSort(key, btn){

  sortKey = key;

  document
    .querySelectorAll(".sbtn")
    .forEach(b =>
      b.classList.remove("active")
    );

  btn.classList.add("active");

  render();
}

async function fetchStock(code){

  try{

    const priceUrl =
      `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${code}&start_date=2026-01-01`;

    const perUrl =
      `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPER&data_id=${code}&start_date=2026-01-01`;

    const [priceRes, perRes] =
      await Promise.all([
        fetch(priceUrl),
        fetch(perUrl)
      ]);

    const priceJson =
      await priceRes.json();

    const perJson =
      await perRes.json();

    if(
      !priceJson.data ||
      !priceJson.data.length
    ){
      return null;
    }

    const latestPrice =
      priceJson.data[
        priceJson.data.length - 1
      ];

    const latestPer =
      perJson.data?.length
        ? perJson.data[
            perJson.data.length - 1
          ]
        : null;

    const price =
      Number(latestPrice.close);

    const open =
      Number(latestPrice.open);

    const change =
      price - open;

    const pct =
      open
        ? (
            (change / open) * 100
          ).toFixed(2)
        : "0.00";

    const per =
      latestPer?.PER || null;

    const eps =
      per
        ? (price / per).toFixed(2)
        : null;

    const growth =
      STOCK_INFO[code]?.growth || 0;

    const peg =
      per && growth
        ? per / growth
        : null;

    return {

      code,

      name:
        STOCK_INFO[code]?.name || code,

      price,

      change,

      pct,

      per,

      eps,

      growth,

      peg
    };

  }catch(err){

    console.error(err);

    return null;
  }
}

async function fetchAllData(){

  const loading =
    document.getElementById("loading");

  loading.style.display = "flex";

  try{

    const results =
      await Promise.all(
        STOCK_POOL.map(fetchStock)
      );

    currentMarket =
      results.filter(Boolean);

    document
      .getElementById("updateTime")
      .textContent =
      "更新：" +
      new Date()
        .toLocaleTimeString();

    render();

  }catch(err){

    console.error(err);

    alert("資料讀取失敗");

  }finally{

    loading.style.display = "none";
  }
}

function render(){

  const grid =
    document.getElementById("mainGrid");

  const query =
    document
      .getElementById("searchInput")
      .value
      .toLowerCase();

  let filtered =
    currentMarket.filter(s => {

      const codeMatch =
        s.code.includes(query);

      const nameMatch =
        s.name
          .toLowerCase()
          .includes(query);

      return codeMatch || nameMatch;
    });

  filtered.sort((a,b)=>{

    if(sortKey === "price"){
      return b.price - a.price;
    }

    if(sortKey === "change"){
      return b.change - a.change;
    }

    if(sortKey === "growth"){
      return b.growth - a.growth;
    }

    if(sortKey === "peg"){

      const A =
        a.peg ?? 999;

      const B =
        b.peg ?? 999;

      return A - B;
    }

    return 0;
  });

  grid.innerHTML =
    filtered.map(s => {

      const isUp =
        s.change > 0;

      const colorClass =
        isUp
          ? "up"
          : s.change < 0
            ? "down"
            : "";

      let pegColor =
        "#999";

      let pegText =
        "無數據";

      if(s.peg){

        if(s.peg < 1){

          pegColor =
            "#34d399";

          pegText =
            "低估";
        }
        else if(s.peg > 1.5){

          pegColor =
            "#f87171";

          pegText =
            "偏貴";
        }
        else{

          pegColor =
            "#fbbf24";

          pegText =
            "合理";
        }
      }

      return `

      <div class="card">

        <div class="card-header">

          <div class="title-group">

            <div class="code">
              ${s.code}
            </div>

            <div class="name">
              ${s.name}
            </div>

          </div>

          ${
            s.peg
            ?
            `
            <div
              class="peg-label"
              style="
                background:${pegColor}22;
                color:${pegColor};
                border:1px solid ${pegColor}55;
              "
            >
              PEG ${s.peg.toFixed(2)}
              <br>
              <span style="font-size:.6rem">
                ${pegText}
              </span>
            </div>
            `
            :
            ""
          }

        </div>

        <div class="price-row">

          <div class="price ${colorClass}">
            ${s.price}
          </div>

          <div class="change ${colorClass}">

            ${
              isUp
                ? "▲"
                : s.change < 0
                  ? "▼"
                  : ""
            }

            ${Math.abs(s.change).toFixed(2)}

            (${s.pct}%)

          </div>

        </div>

        <div class="value-grid">

          <div class="v-box">
            <span class="v-lbl">
              成長率預估
            </span>

            <span class="v-val grow">
              ${s.growth}%
            </span>
          </div>

          <div class="v-box">
            <span class="v-lbl">
              PER
            </span>

            <span class="v-val">
              ${
                s.per
                  ? s.per.toFixed(2)
                  : "--"
              }
            </span>
          </div>

          <div class="v-box">
            <span class="v-lbl">
              推估 EPS
            </span>

            <span class="v-val">
              ${s.eps || "--"}
            </span>
          </div>

          <div class="v-box">
            <span class="v-lbl">
              PEG
            </span>

            <span class="v-val">
              ${
                s.peg
                  ? s.peg.toFixed(2)
                  : "--"
              }
            </span>
          </div>

        </div>

      </div>

      `;
    }).join("");
}

fetchAllData();

setInterval(
  fetchAllData,
  300000
);

</script>
