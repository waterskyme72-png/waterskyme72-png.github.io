<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>00981A 成分股價值監控 (TWSE 盤後版)</title>
<style>
  :root {
    --bg-color: #0b0f1a;
    --card-bg: #161e2d;
    --card-border: #2d3748;
    --text-main: #f1f5f9;
    --text-dim: #94a3b8;
    --up-color: #ef4444; /* 台灣習慣：紅漲 */
    --down-color: #22c55e; /* 台灣習慣：綠跌 */
    --accent: #60a5fa;
    --value-color: #34d399;
  }

  body { margin: 0; background: var(--bg-color); color: var(--text-main); font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; }
  header { padding: 20px 24px; background: #111827; border-bottom: 1px solid var(--card-border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
  h1 { margin: 0; font-size: 1.4rem; color: var(--accent); }
  .subtitle { font-size: 0.75rem; color: var(--text-dim); margin-top: 4px; }
  .controls { display: flex; align-items: center; gap: 15px; }
  #time { color: var(--text-dim); font-size: 0.8rem; font-family: monospace; }
  .src-badge { font-size: 0.65rem; padding: 4px 10px; border-radius: 20px; background: #1e293b; color: #10b981; border: 1px solid #059669; }
  
  button { background: #2563eb; color: white; border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-weight: 600; transition: 0.2s; }
  button:hover { background: #1d4ed8; }
  button:disabled { background: #4b5563; cursor: not-allowed; }

  .sort-bar { padding: 12px 24px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; background: #0f172a; }
  .sort-label { font-size: 0.8rem; color: var(--text-dim); font-weight: bold; }
  .sbtn { background: transparent; border: 1px solid var(--card-border); color: var(--text-dim); padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
  .sbtn.active { background: #3b82f6; border-color: #3b82f6; color: white; }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 24px; }
  .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 20px; transition: transform 0.2s; }
  .card:hover { transform: translateY(-3px); border-color: var(--accent); }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .code { color: var(--accent); font-weight: 800; font-size: 0.9rem; }
  .name { font-size: 1.2rem; font-weight: bold; display: block; }
  
  .price-section { margin: 15px 0; }
  .price { font-size: 2.2rem; font-weight: 800; margin-right: 8px; }
  .change { font-size: 1rem; font-weight: 600; }

  .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .data-box { background: #1e293b66; padding: 10px; border-radius: 8px; border: 1px solid #1e293b; }
  .label { font-size: 0.65rem; color: var(--text-dim); display: block; margin-bottom: 4px; }
  .value { font-size: 0.95rem; font-weight: 700; }

  .peg-indicator { margin-top: 15px; padding-top: 15px; border-top: 1px solid #1e293b; }
  .status-tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; font-weight: bold; }

  .up { color: var(--up-color); }
  .down { color: var(--down-color); }
  footer { text-align: center; padding: 30px; color: var(--text-dim); font-size: 0.75rem; border-top: 1px solid var(--card-border); }
</style>
</head>
<body>

<header>
  <div>
    <h1>00981A 成分股價值監控</h1>
    <div class="subtitle">自動追蹤科技權重股 · 證交所盤後數據整合</div>
  </div>
  <div class="controls">
    <span class="src-badge">TWSE OpenAPI 官網來源</span>
    <span id="time">更新中...</span>
    <button id="refreshBtn" onclick="fetchTwseData()">刷新行情</button>
  </div>
</header>

<div class="sort-bar">
  <span class="sort-label">排序依據：</span>
  <button class="sbtn active" data-sort="peg" onclick="setSort(this)">PEG (低→高)</button>
  <button class="sbtn" data-sort="upside" onclick="setSort(this)">上行空間 (高→低)</button>
  <button class="sbtn" data-sort="yield" onclick="setSort(this)">2026 EPS 成長</button>
</div>

<div id="cards" class="cards"></div>

<footer>
  數據更新：每日 14:30 後更新當日收盤價 · 本益比基於法人預估 2026 EPS · 僅供學術研究與個人參考
</footer>

<script>
// 00981A 核心成分股清單 (可自行增減)
// eps2026: 參考法人研究報告預估值
// targetPrice: 法人平均目標價
const COMPONENTS = {
  '2330': { name: '台積電', eps2026: 65.5, growth: 25, target: 1200 },
  '2454': { name: '聯發科', eps2026: 82.0, growth: 18, target: 1550 },
  '2317': { name: '鴻海',   eps2026: 16.8, growth: 22, target: 250 },
  '2308': { name: '台達電', eps2026: 18.5, growth: 15, target: 450 },
  '2379': { name: '瑞昱',   eps2026: 35.0, growth: 12, target: 600 },
  '3034': { name: '聯詠',   eps2026: 42.0, growth: 10, target: 650 },
  '3711': { name: '日月光', eps2026: 15.7, growth: 30, target: 210 },
  '2382': { name: '廣達',   eps2026: 19.5, growth: 28, target: 360 },
  '6669': { name: '緯穎',   eps2026: 145.0, growth: 35, target: 2800 },
  '3037': { name: '欣興',   eps2026: 14.5, growth: 20, target: 220 }
};

let marketData = {};
let sortKey = 'peg';

async function fetchTwseData() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = '讀取證交所資料...';

  try {
    // 使用 TWSE OpenAPI V1
    const response = await fetch('https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL');
    const data = await response.json();
    
    // 將陣列轉為以代碼為 Key 的物件
    marketData = data.reduce((acc, stock) => {
      if (COMPONENTS[stock.Code]) {
        acc[stock.Code] = {
          price: parseFloat(stock.ClosingPrice),
          change: parseFloat(stock.Change),
          vol: stock.TradeVolume
        };
      }
      return acc;
    }, {});

    document.getElementById('time').textContent = '最後更新: ' + new Date().toLocaleTimeString();
    render();
  } catch (error) {
    console.error('Fetch Error:', error);
    alert('無法從證交所獲取資料，請檢查網路或是否為非交易時段。');
  } finally {
    btn.disabled = false;
    btn.textContent = '刷新行情';
  }
}

function setSort(btn) {
  sortKey = btn.dataset.sort;
  document.querySelectorAll('.sbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function getPegStatus(peg) {
  if (!peg) return { label: '數據不足', color: '#94a3b8' };
  if (peg < 0.8) return { label: '極度低估', color: '#22c55e' };
  if (peg < 1.2) return { label: '價值合理', color: '#3b82f6' };
  return { label: '股價偏高', color: '#ef4444' };
}

function render() {
  const container = document.getElementById('cards');
  
  // 建立計算後的資料陣列
  const list = Object.keys(COMPONENTS).map(code => {
    const info = COMPONENTS[code];
    const live = marketData[code] || { price: 0, change: 0 };
    const pe = live.price / info.eps2026;
    const peg = pe / info.growth;
    const upside = ((info.target - live.price) / live.price) * 100;

    return { code, ...info, ...live, pe, peg, upside };
  });

  // 排序邏輯
  list.sort((a, b) => {
    if (sortKey === 'peg') return a.peg - b.peg;
    if (sortKey === 'upside') return b.upside - a.upside;
    if (sortKey === 'yield') return b.growth - a.growth;
    return 0;
  });

  container.innerHTML = list.map(s => {
    const pegStatus = getPegStatus(s.peg);
    const changeClass = s.change > 0 ? 'up' : s.change < 0 ? 'down' : '';
    const upsideClass = s.upside > 15 ? 'up' : '';

    return `
      <div class="card">
        <div class="card-header">
          <div>
            <span class="code">${s.code}.TW</span>
            <span class="name">${s.name}</span>
          </div>
          <span class="status-tag" style="background:${pegStatus.color}22; color:${pegStatus.color}">
            ${pegStatus.label}
          </span>
        </div>

        <div class="price-section">
          <span class="price ${changeClass}">${s.price || '—'}</span>
          <span class="change ${changeClass}">${s.change > 0 ? '▲' : '▼'}${Math.abs(s.change)}</span>
        </div>

        <div class="data-grid">
          <div class="data-box">
            <span class="label">2026 預估 PE</span>
            <span class="value">${s.pe ? s.pe.toFixed(1) : '—'} x</span>
          </div>
          <div class="data-box">
            <span class="label">PEG 指標</span>
            <span class="value" style="color:${pegStatus.color}">${s.peg ? s.peg.toFixed(2) : '—'}</span>
          </div>
          <div class="data-box">
            <span class="label">EPS 預期成長</span>
            <span class="value" style="color:#fbbf24">${s.growth}%</span>
          </div>
          <div class="data-box">
            <span class="label">目標價潛力</span>
            <span class="value ${upsideClass}">${s.upside ? s.upside.toFixed(1) : '—'}%</span>
          </div>
        </div>

        <div class="peg-indicator">
          <span class="label">2026 預估 EPS: $${s.eps2026}</span>
        </div>
      </div>
    `;
  }).join('');
}

// 初始讀取
fetchTwseData();
</script>
</body>
</html>
