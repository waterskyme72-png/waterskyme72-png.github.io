<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股 200 強價值監控 - 修正版</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --dim: #8b949e;
            --up: #f85149;
            --down: #3fb950;
            --accent: #58a6ff;
        }

        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        header {
            padding: 16px 24px;
            background: #010409;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .logo h1 {
            margin: 0;
            color: var(--accent);
            font-size: 1.2rem;
        }

        .category-bar {
            padding: 12px 24px;
            background: #0d1117;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 8px;
            overflow-x: auto;
            align-items: center;
        }
        .c-btn {
            background: #21262d;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.85rem;
        }
        .c-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            font-weight: bold;
        }

        .sync-area {
            padding: 10px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #161b22;
            border-bottom: 1px solid var(--border);
        }
        .btn-sync {
            background: #238636;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            display: none;
        }
        .btn-sync:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .sort-bar {
            padding: 8px 24px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            border-bottom: 1px solid var(--border);
        }
        .sbtn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--dim);
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .sbtn.active {
            border-color: var(--accent);
            color: var(--accent);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
            padding: 20px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            transition: 0.2s;
            position: relative;
        }
        .card:hover {
            border-color: #8b949e;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .code {
            font-size: 0.8rem;
            color: var(--dim);
            font-family: monospace;
        }
        .name {
            font-size: 1.15rem;
            font-weight: 800;
            color: white;
            margin-top: 2px;
        }

        .price-row {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 14px;
        }
        .price {
            font-size: 2rem;
            font-weight: 800;
        }
        .change {
            font-size: 1rem;
            font-weight: 600;
        }
        .up {
            color: var(--up);
        }
        .down {
            color: var(--down);
        }

        .peg-label {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: bold;
            text-align: center;
        }
        .value-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .v-box {
            background: #0d1117;
            padding: 8px;
            border-radius: 6px;
        }
        .v-lbl {
            display: block;
            font-size: 0.6rem;
            color: var(--dim);
            margin-bottom: 2px;
        }
        .v-val {
            font-size: 0.9rem;
            font-weight: 700;
        }

        #loading {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            flex-direction: column;
        }
        .progress-info {
            color: white;
            margin-top: 15px;
            font-size: 1rem;
            text-align: center;
        }

        @media (max-width: 600px) {
            .search-box {
                width: 140px !important;
            }
            .sync-area {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div id="loading">
        <div style="font-size: 2rem; animation: pulse 1s infinite;">🛰️</div>
        <div class="progress-info" id="progressText">準備同步中...</div>
    </div>

    <header>
        <div class="logo">
            <h1>台股價值監控 <small style="font-size: 0.7rem; color: var(--dim);">PEG 修正版</small></h1>
        </div>
        <input type="text" id="searchInput" class="search-box" style="background:#0d1117; border:1px solid var(--border); border-radius:6px; padding:8px; color:white; width:200px;" placeholder="篩選當前結果..." oninput="render()">
    </header>

    <div class="category-bar" id="categoryBar">
        <button class="c-btn" onclick="selectCat('semi')">半導體/IC</button>
        <button class="c-btn" onclick="selectCat('ai')">AI/電腦週邊</button>
        <button class="c-btn" onclick="selectCat('component')">電子零組件</button>
        <button class="c-btn" onclick="selectCat('finance')">金融/保險</button>
        <button class="c-btn" onclick="selectCat('old_heavy')">航運/鋼鐵/水泥</button>
        <button class="c-btn" onclick="selectCat('plastic_chem')">塑化/紡織/生技</button>
        <button class="c-btn" onclick="selectCat('power')">電機/重電/能源</button>
        <button class="c-btn" onclick="selectCat('other')">通路/其他權值</button>
    </div>

    <div class="sync-area">
        <div id="catDesc" style="font-size: 0.9rem; color: var(--accent);">👈 請選擇產業別並開始同步</div>
        <div style="display:flex; gap:10px; align-items:center;">
            <span id="updateTime" style="font-size: 0.8rem; color: var(--dim);"></span>
            <button id="syncBtn" class="btn-sync" onclick="fetchAllData()">🚀 同步數據</button>
        </div>
    </div>

    <div class="sort-bar">
        <button class="sbtn active" onclick="setSort('price', this)">股價排序</button>
        <button class="sbtn" onclick="setSort('peg', this)">PEG 低→高</button>
        <button class="sbtn" onclick="setSort('change', this)">漲跌幅</button>
    </div>

    <div id="mainGrid" class="grid"></div>

    <script>
        // ===== 擴充後的 200 強產業數據庫 =====
        const CATEGORIES = {
            semi: { label: "半導體/IC設計", stocks: { "2330": "台積電", "2454": "聯發科", "2303": "聯電", "3711": "日月光投控", "2449": "京元電子", "3034": "聯詠", "3443": "創意", "3661": "世芯-KY", "6415": "矽力-KY", "6488": "環球晶", "8046": "南電", "2379": "瑞昱", "3035": "智原", "3532": "台勝科", "4919": "新唐", "4961": "天鈺", "5269": "祥碩", "5274": "信驊", "6239": "力成", "8299": "群聯", "2337": "旺宏", "2344": "華邦電", "2408": "南亞科" } },
            ai: { label: "AI/電腦週邊", stocks: { "2317": "鴻海", "2382": "廣達", "2308": "台達電", "3017": "奇鋐", "6669": "緯穎", "3231": "緯創", "2357": "華碩", "2376": "技嘉", "2301": "光寶科", "2353": "宏碁", "2395": "研華", "3008": "大立光", "3044": "健鼎", "3515": "華擎", "3533": "嘉澤", "4958": "臻鼎-KY", "6213": "聯茂", "8016": "矽創", "2324": "仁寶", "2356": "英業達", "4938": "和碩" } },
            component: { label: "電子零組件/光電", stocks: { "2327": "國巨", "3037": "欣興", "2409": "面板-友達", "3481": "面板-群創", "2313": "華通", "2360": "致茂", "2367": "燿華", "2368": "金像電", "2421": "建準", "2474": "可成", "3019": "亞光", "3376": "新日興", "6153": "嘉聯益", "6269": "台郡", "6271": "同欣電", "6278": "台表科", "6409": "旭隼" } },
            finance: { label: "金融/保險", stocks: { "2881": "富邦金", "2882": "國泰金", "2884": "玉山金", "2885": "元大金", "2886": "兆豐金", "2891": "中信金", "5880": "合庫金", "2880": "華南金", "2883": "開發金", "2887": "台新金", "2888": "新光金", "2889": "國票金", "2890": "永豐金", "2892": "第一金", "5871": "中租-KY", "5876": "上海商銀", "6005": "群益證", "2834": "臺企銀" } },
            old_heavy: { label: "航運/鋼鐵/水泥", stocks: { "2603": "長榮", "2609": "陽明", "2615": "萬海", "2618": "長榮航", "2610": "華航", "2002": "中鋼", "2014": "中鴻", "2027": "大成鋼", "1101": "台泥", "1102": "亞泥", "1216": "統一", "1210": "大成", "9921": "巨大", "9945": "潤泰新", "2105": "正新" } },
            plastic_chem: { label: "塑化/紡織/生技", stocks: { "1301": "台塑", "1303": "南亞", "1326": "台化", "6505": "台塑化", "1722": "台肥", "1795": "美時", "6446": "藥華藥", "4147": "龍燈-KY", "1402": "遠東新", "1476": "儒鴻", "1477": "聚陽", "9910": "豐泰", "1707": "葡萄王" } },
            power: { label: "電機/重電/能源", stocks: { "1513": "中興電", "1519": "華城", "1503": "士電", "1514": "亞力", "1504": "東元", "1560": "中砂", "2049": "上銀", "2331": "精英", "6806": "森崴能源", "9904": "寶成", "9933": "中鼎" } },
            other: { label: "通路/其他權值", stocks: { "2412": "中華電", "4904": "遠傳", "3045": "台灣大", "2912": "統一超", "8454": "富邦媒", "2633": "高鐵", "2347": "聯強", "3702": "大聯大", "3036": "文曄", "9930": "中聯資源", "2207": "和泰車" } }
        };

        let currentCat = null;
        let currentMarket = [];
        let sortKey = "price";

        // ===== 頁面初始化：從 LocalStorage 載入緩存 =====
        function loadCache(catId) {
            const key = `marketData_${catId}`;
            const cached = localStorage.getItem(key);
            if (cached) {
                try {
                    const data = JSON.parse(cached);
                    if (Array.isArray(data) && data.length > 0) {
                        return data;
                    }
                } catch (e) { /* ignore */ }
            }
            return [];
        }

        function saveCache(catId, data) {
            const key = `marketData_${catId}`;
            localStorage.setItem(key, JSON.stringify(data));
        }

        function selectCat(id) {
            currentCat = id;
            document.querySelectorAll('.c-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`button[onclick="selectCat('${id}')"]`).classList.add('active');

            document.getElementById('catDesc').textContent = `${CATEGORIES[id].label} (${Object.keys(CATEGORIES[id].stocks).length} 檔)`;
            document.getElementById('syncBtn').style.display = 'block';

            // 先顯示緩存數據
            currentMarket = loadCache(id);
            render();

            // 如果緩存為空，自動觸發同步
            if (currentMarket.length === 0) {
                fetchAllData();
            } else {
                document.getElementById('updateTime').textContent =
                    `上次數據: ${new Date().toLocaleTimeString()} (來自緩存)`;
            }
        }

        // ===== 修正後的 EPS 成長率計算（放寬標準） =====
        async function fetchEPSGrowth(code) {
            try {
                const year = new Date().getFullYear() - 2;
                const epsUrl =
                    `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockEPS&data_id=${code}&start_date=${year}-01-01`;
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 8000);
                const res = await fetch(epsUrl, { signal: controller.signal });
                clearTimeout(timeout);
                if (!res.ok) return null;
                const json = await res.json();
                
                // 過濾掉無效的 EPS 值
                const validData = json.data.filter(item => item.EPS !== null && item.EPS !== undefined && !isNaN(Number(item.EPS)));
                // 至少需要 8 個季度才能計算年增率（原為 8，這裡維持標準要求，確保數據可靠）
                if (validData.length < 8) return null;

                // 按日期排序（最近的在前）
                const sorted = validData.sort((a, b) => {
                    const dateA = new Date(a.date).getTime();
                    const dateB = new Date(b.date).getTime();
                    return dateB - dateA;
                });

                const recent = sorted.slice(0, 8);
                
                // 近四季總和 (前4個)
                const epsRecent4 = recent.slice(0, 4).reduce((sum, item) => sum + Number(item.EPS), 0);
                // 去年同期四季總和 (後4個)
                const epsLast4 = recent.slice(4, 8).reduce((sum, item) => sum + Number(item.EPS), 0);

                // ✅ 專家修正：處理去年 EPS 為 0 的情況，且今年轉盈
                if (epsLast4 === 0) {
                    if (epsRecent4 > 0) {
                        // 由虧轉盈，回傳 999 表示「轉盈」
                        return 999;
                    } else {
                        // 仍然沒賺錢或持續虧損
                        return null;
                    }
                }

                // 計算成長率（允許負值，保留小數一位）
                let growth = (epsRecent4 - epsLast4) / Math.abs(epsLast4) * 100;
                return Math.round(growth * 10) / 10;
            } catch (e) {
                console.warn(`[${code}] 獲取EPS失敗:`, e.message);
                return null;
            }
        }

        // ===== 穩定的 fetchStock（序列化 + 重試） =====
        async function fetchStock(code, name, retries = 2) {
            for (let attempt = 0; attempt < retries; attempt++) {
                try {
                    const year = new Date().getFullYear() - 1;
                    const controller = new AbortController();
                    const timeout = setTimeout(() => controller.abort(), 10000);

                    const priceUrl =
                        `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${code}&start_date=${year}-01-01`;
                    const perUrl =
                        `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPER&data_id=${code}&start_date=${year}-01-01`;

                    const [pRes, vRes] = await Promise.all([
                        fetch(priceUrl, { signal: controller.signal }),
                        fetch(perUrl, { signal: controller.signal })
                    ]);

                    clearTimeout(timeout);

                    if (!pRes.ok || !vRes.ok) throw new Error('HTTP error');

                    const pJson = await pRes.json();
                    const vJson = await vRes.json();

                    if (!pJson.data?.length) throw new Error('No price data');

                    const last = pJson.data[pJson.data.length - 1];
                    const lastV = vJson.data?.[vJson.data.length - 1] || { PER: null };

                    const price = Number(last.close);
                    const open = Number(last.open);
                    const change = price - open;

                    let per = lastV?.PER;
                    if (!per || per <= 0 || per > 200) {
                        per = price / 6;
                    }

                    // 獲取 EPS 成長率（已放寬）
                    const growthFromEPS = await fetchEPSGrowth(code);
                    let growth = null;
                    let peg = null;

                    // ✅ 預期成長無論正負都保留
                    if (growthFromEPS !== null) {
                        growth = growthFromEPS;
                        // ✅ 僅當成長率 >= 5 且為正成長時才計算 PEG（符合專家標準）
                        if (growth >= 5) {
                            peg = per / (growth / 100);
                        }
                    }

                    return {
                        code,
                        name,
                        price,
                        change,
                        pct: open ? (change / open * 100).toFixed(2) : "0.00",
                        per: Number(per).toFixed(2),
                        eps: per ? (price / per).toFixed(2) : "--",
                        growth,
                        peg
                    };

                } catch (e) {
                    if (attempt === retries - 1) {
                        console.warn(`[${code}] 同步失敗:`, e.message);
                        return null;
                    }
                    await new Promise(r => setTimeout(r, 500 * (attempt + 1)));
                }
            }
        }

        // ===== 優化的 fetchAllData（序列化 + 持久化，間隔 500ms） =====
        async function fetchAllData() {
            if (!currentCat) return;

            const loading = document.getElementById("loading");
            const progText = document.getElementById("progressText");
            const syncBtn = document.getElementById("syncBtn");

            loading.style.display = "flex";
            syncBtn.disabled = true;

            const stockList = CATEGORIES[currentCat].stocks;
            const codes = Object.keys(stockList);
            const results = [];
            const failedList = [];

            for (let i = 0; i < codes.length; i++) {
                const code = codes[i];
                progText.textContent = `同步中：${stockList[code]} (${i + 1}/${codes.length})`;

                const data = await fetchStock(code, stockList[code]);
                if (data) {
                    results.push(data);
                } else {
                    failedList.push(code);
                }

                await new Promise(r => setTimeout(r, 500));
            }

            if (failedList.length > 0) {
                progText.textContent = `重試失敗的 ${failedList.length} 檔...`;
                for (let i = 0; i < failedList.length; i++) {
                    const code = failedList[i];
                    const data = await fetchStock(code, stockList[code], 1);
                    if (data) results.push(data);
                    await new Promise(r => setTimeout(r, 600));
                }
            }

            currentMarket = results;
            saveCache(currentCat, results);

            document.getElementById("updateTime").textContent =
                `最後更新: ${new Date().toLocaleTimeString()} (共 ${results.length} 檔)`;
            loading.style.display = "none";
            syncBtn.disabled = false;

            if (results.length < codes.length) {
                alert(`同步完成，但有 ${codes.length - results.length} 檔股票數據缺失。\n可再次點擊同步重試。`);
            }

            render();
        }

        function setSort(key, btn) {
            sortKey = key;
            document.querySelectorAll(".sbtn").forEach(b => b.classList.remove("active"));
            btn.classList.add('active');
            render();
        }

        function render() {
            const grid = document.getElementById("mainGrid");
            const query = document.getElementById("searchInput").value.toLowerCase();

            let filtered = currentMarket.filter(s => s.code.includes(query) || s.name.includes(query));

            filtered.sort((a, b) => {
                if (sortKey === "peg") {
                    const pa = a.peg !== null ? a.peg : 99999;
                    const pb = b.peg !== null ? b.peg : 99999;
                    return pa - pb;
                }
                if (sortKey === "change") return (b.change / b.price) - (a.change / a.price);
                return b.price - a.price;
            });

            if (filtered.length === 0 && currentCat) {
                grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:80px; color:var(--dim);">尚無數據，請點擊「🚀 同步數據」。</div>`;
                return;
            }

            grid.innerHTML = filtered.map(s => {
                const isUp = s.change > 0;
                const cClass = isUp ? "up" : (s.change < 0 ? "down" : "");

                let pegDisplay, pegColor, pegStatus;
                if (s.peg !== null && s.peg !== undefined) {
                    pegDisplay = Number(s.peg).toFixed(2);
                    if (s.peg < 1) {
                        pegColor = "#34d399";
                        pegStatus = "低估";
                    } else if (s.peg <= 1.5) {
                        pegColor = "#fbbf24";
                        pegStatus = "合理";
                    } else {
                        pegColor = "#f87171";
                        pegStatus = "偏貴";
                    }
                } else {
                    pegDisplay = "N/A";
                    pegColor = "#8b949e";
                    pegStatus = "數據不足";
                }

                // ✅ 預期成長顯示邏輯
                let growthDisplay;
                if (s.growth === null) {
                    growthDisplay = '--';
                } else if (s.growth === 999) {
                    growthDisplay = '轉盈';
                } else {
                    growthDisplay = s.growth + '%';
                }

                return `
              <div class="card">
                <div class="card-header">
                  <div>
                    <div class="code">${s.code}</div>
                    <div class="name">${s.name}</div>
                  </div>
                  <div class="peg-label" style="background:${pegColor}15; color:${pegColor}; border:1px solid ${pegColor}40;">
                    PEG ${pegDisplay}<br><span style="font-size:0.6rem">${pegStatus}</span>
                  </div>
                </div>
                <div class="price-row">
                  <div class="price ${cClass}">${s.price.toFixed(1)}</div>
                  <div class="change ${cClass}">${isUp ? '▲' : (s.change < 0 ? '▼' : '')} ${Math.abs(s.change).toFixed(1)} (${s.pct}%)</div>
                </div>
                <div class="value-grid">
                  <div class="v-box"><span class="v-lbl">估算 EPS</span><span class="v-val">${s.eps}</span></div>
                  <div class="v-box"><span class="v-lbl">本益比 PER</span><span class="v-val">${s.per}</span></div>
                  <div class="v-box"><span class="v-lbl">預期成長</span><span class="v-val" style="color:#fbbf24">${growthDisplay}</span></div>
                  <div class="v-box"><span class="v-lbl">監控</span><span class="v-val" style="color:var(--accent)">Active</span></div>
                </div>
              </div>
            `;
            }).join("");
        }
    </script>
</body>
</html>
